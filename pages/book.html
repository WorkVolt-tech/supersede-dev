<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperSede — Chapters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0:      #05080c;
      --bg-1:      #0a1018;
      --panel:     #0d131c;
      --page-l:   #0b1208;
      --page-r:   #0d1408;
      --ink:       #dfe7f2;
      --ink-dim:   #7a7055;
      --ink-faint: #3a4354;
      --ice:       #8fd8f0;
      --ice-hot:   #c8eeff;
      --amber:     #ffb347;
      --warn:      #e05a44;
      --line:      #1e1c0e;
      --green:     #5ec45e;
      --gold:      #c8a84a;
      --gold-hot:  #f0d080;
      --gold-dim:  #7a6430;
      --spine-w:   28px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      min-height:100vh;
      background: radial-gradient(ellipse at 50% 10%, #0e1408 0%, #05080c 55%, #020401 100%);
      color:var(--ink);
      font-family:'Cormorant Garamond',serif;
      overflow-x:hidden;
    }

    /* scanlines */
    body::after {
      content:""; position:fixed; inset:0; pointer-events:none; z-index:9998;
      background-image: repeating-linear-gradient(180deg,
        rgba(200,168,74,.010) 0px, rgba(200,168,74,.010) 1px,
        transparent 1px, transparent 4px);
    }

    /* ── NAV ── */
    #nav { position:relative; z-index:200; }
    #nav, #nav * {
      background:transparent !important;
      box-shadow:none !important;
      border-radius:0 !important;
    }
    #nav a, #nav button {
      font-family:'JetBrains Mono',monospace !important;
      font-size:10px !important;
      letter-spacing:.28em !important;
      text-transform:uppercase !important;
      color:var(--ink-dim) !important;
      text-decoration:none !important;
      border:none !important;
      padding:0 !important;
      transition:color .2s !important;
    }
    #nav a:hover, #nav button:hover { color:var(--gold) !important; }
    #nav > *, #nav nav, #nav div {
      border-bottom:1px solid var(--line) !important;
      padding:14px 32px !important; display:flex !important;
      align-items:center !important; gap:28px !important; flex-wrap:wrap !important;
    }

    /* ── OUTER WRAPPER ── */
    .scene {
      max-width:1060px;
      margin:0 auto;
      padding:28px 24px 60px;
    }

    /* zone header */
    .zone {
      display:flex; align-items:baseline; justify-content:space-between;
      padding:20px 0 22px; gap:24px;
    }
    .z-kicker { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.42em; color:var(--gold); text-transform:uppercase; }
    .z-title  { font-size:22px; font-weight:500; letter-spacing:.04em; color:var(--ink); margin-top:4px; }
    .z-sub    { font-size:14px; color:var(--ink-dim); font-style:italic; text-align:right; line-height:1.5; max-width:340px; }

    /* ══════════════════════════════
       BOOK SHELL — 3D perspective
    ══════════════════════════════ */
    .book-shell {
      perspective: 1800px;
      perspective-origin: 50% 42%;
    }

    .book-body {
      display: flex;
      align-items: stretch;
      min-height: 560px;
      position: relative;
      transform: rotateX(3deg);
      transform-style: preserve-3d;
      filter: drop-shadow(0 28px 60px rgba(0,0,0,.85));
    }

    /* ── COVER BOARDS (top/bottom visual chrome) ── */
    .book-body::before,
    .book-body::after {
      content:"";
      position:absolute;
      left:0; right:0;
      height:10px;
      background: linear-gradient(180deg, #14120a, #08111c);
      border:1px solid #2a2412;
      z-index:10;
      pointer-events:none;
    }
    .book-body::before { top:-10px; border-bottom:none; }
    .book-body::after  { bottom:-10px; border-top:none; }

    /* ── LEFT PAGE ── */
    .page-left {
      flex: 1;
      background: var(--page-l);
      border: 1px solid var(--line);
      border-right: none;
      padding: 32px 28px 32px 32px;
      position: relative;
      overflow: hidden;
    }
    /* subtle inner gradient — lit from spine */
    .page-left::before {
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(90deg, rgba(200,168,74,.018) 0%, transparent 60%);
      pointer-events:none;
    }
    /* ice corner brackets */
    .page-left::after {
      content:"";
      position:absolute; top:-1px; left:-1px;
      width:18px; height:18px;
      border-top:1px solid var(--gold); border-left:1px solid var(--gold);
      pointer-events:none;
    }
    .page-left .corner-br {
      position:absolute; bottom:-1px; left:-1px;
      width:18px; height:18px;
      border-bottom:1px solid var(--gold); border-left:1px solid var(--gold);
    }

    /* ── SPINE ── */
    .spine {
      width: var(--spine-w);
      flex-shrink: 0;
      background: linear-gradient(180deg,
        #14120a 0%, #0e0c06 20%, #141208 50%, #0e0c06 80%, #14120a 100%);
      border-left:  1px solid #2a2412;
      border-right: 1px solid #2a2412;
      position: relative;
      z-index: 5;
      box-shadow:
        inset 2px 0 6px rgba(0,0,0,.5),
        inset -2px 0 6px rgba(0,0,0,.5);
    }
    /* spine highlight */
    .spine::before {
      content:"";
      position:absolute;
      top:0; left:50%;
      width:1px; height:100%;
      background: linear-gradient(180deg, transparent, rgba(200,168,74,.12) 30%, rgba(200,168,74,.12) 70%, transparent);
    }

    /* ── RIGHT PAGE ── */
    .page-right {
      flex: 1;
      background: var(--page-r);
      border: 1px solid var(--line);
      border-left: none;
      padding: 32px 32px 32px 28px;
      position: relative;
      overflow: hidden;
    }
    .page-right::before {
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(270deg, rgba(200,168,74,.014) 0%, transparent 60%);
      pointer-events:none;
    }
    /* top-right corner bracket */
    .page-right::after {
      content:"";
      position:absolute; top:-1px; right:-1px;
      width:18px; height:18px;
      border-top:1px solid var(--gold); border-right:1px solid var(--gold);
      pointer-events:none;
    }
    .page-right .corner-br {
      position:absolute; bottom:-1px; right:-1px;
      width:18px; height:18px;
      border-bottom:1px solid var(--gold); border-right:1px solid var(--gold);
    }

    /* ── LEFT PAGE CONTENT ── */
    .page-label {
      font-family:'JetBrains Mono',monospace;
      font-size:9.5px; letter-spacing:.42em; text-transform:uppercase;
      color:var(--gold); margin-bottom:6px;
    }
    .page-title {
      font-size:22px; font-weight:500; letter-spacing:.04em;
      color:var(--ink); margin-bottom:18px;
    }
    .ink-rule {
      border:none;
      border-top:1px solid var(--line);
      margin:16px 0;
    }

    /* chapter entries */
    .chapter-entry {
      display:flex; align-items:center; gap:16px;
      padding:16px 0; border-bottom:1px solid var(--line);
      cursor:default;
    }
    .chapter-entry:last-child { border-bottom:none; }
    .chapter-entry.locked { opacity:.38; }

    /* Watcher thumbnail */
    .ch-thumb {
      width:68px; height:68px; flex-shrink:0;
      border:1px solid var(--line);
      background: radial-gradient(ellipse at 50% 38%, #0e2030 0%, #04080e 60%, #020305 100%);
      overflow:hidden; position:relative;
      transition:border-color .25s;
    }
    .chapter-entry:not(.locked):hover .ch-thumb { border-color:var(--gold); }
    .ch-thumb svg { width:100%; height:100%; display:block; }

    .ch-info { flex:1; min-width:0; }
    .ch-title { font-size:18px; font-weight:500; color:var(--ink); letter-spacing:.03em; line-height:1.2; }
    .ch-sub   { font-style:italic; font-size:13.5px; color:var(--ink-dim); margin-top:3px; }
    .ch-sealed{
      font-family:'JetBrains Mono',monospace; font-size:9px;
      letter-spacing:.28em; color:var(--ink-faint); text-transform:uppercase;
    }
    .ch-btn {
      font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.26em;
      text-transform:uppercase; color:var(--ink); background:transparent;
      border:1px solid var(--line); padding:6px 12px; text-decoration:none;
      transition:border-color .2s, color .2s, background .2s;
      white-space:nowrap; flex-shrink:0;
    }
    .ch-btn:hover, .ch-btn.active {
      border-color:var(--gold); color:var(--gold);
      background:rgba(200,168,74,.05);
    }

    /* boot terminal */
    .boot {
      border:1px solid rgba(200,168,74,.3);
      background:rgba(8,16,26,.75);
      padding:12px 14px;
      font-family:'JetBrains Mono',monospace;
      font-size:10px; letter-spacing:.06em;
      color:var(--ice-hot); line-height:1.7;
      margin-top:18px;
    }
    .bline { opacity:0; animation:bpop .3s ease forwards; }
    @keyframes bpop { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }
    .bline:nth-child(1){animation-delay:.3s}
    .bline:nth-child(2){animation-delay:.9s}
    .bline:nth-child(3){animation-delay:1.5s}
    .bline:nth-child(4){animation-delay:2.1s}
    .bline:nth-child(5){animation-delay:2.7s;color:var(--amber);font-weight:700;letter-spacing:.12em}
    .bline:nth-child(6){animation-delay:3.3s;color:var(--ink-dim)}
    .bcursor{display:inline-block;width:7px;height:11px;background:var(--ice-hot);vertical-align:middle;animation:blink 1s steps(2) infinite;margin-left:2px}
    @keyframes blink{50%{opacity:0}}

    /* ── RIGHT PAGE CONTENT ── */
    .rec-label {
      font-family:'JetBrains Mono',monospace;
      font-size:9.5px; letter-spacing:.42em; text-transform:uppercase;
      color:var(--gold); margin-bottom:6px;
    }
    .rec-name {
      font-size:24px; font-weight:500; letter-spacing:.05em;
      color:var(--ink); margin-bottom:18px;
    }

    .stat-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:14px 8px; margin-bottom:20px;
    }
    .stat-cell { display:flex; flex-direction:column; }
    .stat-k {
      font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.3em;
      color:var(--ink-dim); text-transform:uppercase; margin-bottom:2px;
    }
    .stat-v { font-size:19px; font-weight:500; color:var(--ink); letter-spacing:.04em; }
    .stat-v.ice   { color:var(--gold); }
    .stat-v.amber { color:var(--amber); }
    .stat-v.green { color:var(--green); }

    .action-row { display:flex; flex-direction:column; gap:7px; }
    .action-btn {
      font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.26em;
      text-transform:uppercase; color:var(--ink-dim); background:transparent;
      border:1px solid var(--line); padding:8px 12px; text-decoration:none;
      transition:all .18s; cursor:pointer; text-align:left;
    }
    .action-btn:hover {
      border-color:var(--gold); color:var(--gold);
      background:rgba(200,168,74,.04);
    }

    .ink-quote {
      margin-top:20px;
      padding:12px 14px;
      border-left:2px solid var(--gold);
      background:rgba(200,168,74,.04);
      font-style:italic; font-size:15px; line-height:1.5; color:#b0bfcf;
    }
    .ink-quote .attr {
      display:block; margin-top:8px; font-style:normal;
      font-family:'JetBrains Mono',monospace;
      font-size:8.5px; letter-spacing:.3em; color:var(--ink-dim); text-transform:uppercase;
    }

    /* ── WATCHER THUMB ANIMATIONS ── */
    @keyframes wt-float  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-5px) scale(1.01)} }
    @keyframes wt-srot   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes wt-pMain  { 0%,100%{filter:drop-shadow(0 0 4px #ffd68a) drop-shadow(0 0 10px #ffb347)} 50%{filter:drop-shadow(0 0 9px #ffd68a) drop-shadow(0 0 22px #ffb347)} }
    @keyframes wt-pSmall { 0%,100%{filter:drop-shadow(0 0 2px #c8eeff) drop-shadow(0 0 6px #8fd8f0)} 50%{filter:drop-shadow(0 0 5px #c8eeff) drop-shadow(0 0 13px #8fd8f0)} }
    @keyframes wt-beam   { 0%,100%{transform:rotate(-8deg);opacity:.5} 50%{transform:rotate(8deg);opacity:.9} }
    .ch-thumb .wt-float    { animation:wt-float 6s ease-in-out infinite; transform-origin:50% 50%; }
    .ch-thumb .wt-srot     { animation:wt-srot 30s linear infinite; transform-origin:400px 370px; }
    .ch-thumb .wt-eye-main { animation:wt-pMain  3.6s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
    .ch-thumb .wt-eye-small{ animation:wt-pSmall 2.4s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
    .ch-thumb .wt-beam     { transform-origin:400px 420px; animation:wt-beam 5s ease-in-out infinite; }

    /* scrollbar */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg-0)}
    ::-webkit-scrollbar-thumb{background:var(--line)}
  </style>
</head>
<body>

<div class="scene">
<div id="nav"></div>

  <div class="zone">
    <div>
      <div class="z-kicker">SuperSede · Archive</div>
      <div class="z-title">Table of Contents</div>
    </div>
    <div class="z-sub">Select a chapter.<br>Progress &amp; inventory are preserved.</div>
  </div>

  <!-- ══ THE BOOK ══ -->
  <div class="book-shell">
    <div class="book-body">

      <!-- LEFT PAGE — chapter list -->
      <div class="page-left">
        <div class="corner-br"></div>

        <p class="page-label">SuperSede · Chapters</p>
        <p class="page-title">Select a Chapter</p>
        <hr class="ink-rule">

        <div id="chapter-list"></div>
      </div>

      <!-- SPINE -->
      <div class="spine"></div>

      <!-- RIGHT PAGE — player record -->
      <div class="page-right">
        <div class="corner-br"></div>

        <p class="rec-label">Player Record</p>
        <p class="rec-name" id="rec-username">—</p>
        <hr class="ink-rule">

        <div class="stat-grid" id="rec-stats"></div>

        <hr class="ink-rule">

        <div class="action-row">
          <a href="inventory.html" class="action-btn">🎒 Inventory</a>
          <a href="trader.html"    class="action-btn">🛒 Trader</a>
          <a href="lobby.html"     class="action-btn">⚔ Lobby</a>
          <a href="badges.html"    class="action-btn">🏅 Badges</a>
        </div>

        <div class="ink-quote">
          "Every path you walked. Every player you helped — or abandoned."
          <span class="attr">— The Watcher · Chapter 1 Finale</span>
        </div>
      </div>

    </div><!-- /book-body -->
  </div><!-- /book-shell -->

</div><!-- /scene -->

      <circle cx="400" cy="370" r="110" stroke-dasharray="2 6"/>
      <circle cx="400" cy="370" r="150" stroke-dasharray="1 10"/>
      <line x1="260" y1="370" x2="290" y2="370"/>
      <line x1="510" y1="370" x2="540" y2="370"/>
      <line x1="400" y1="220" x2="400" y2="250"/>
      <line x1="400" y1="490" x2="400" y2="520"/>
    </g>
  </svg>`

  const CH_COVERS = { 1: WATCHER_SVG }

  ;(async () => {
    const player = await renderNav('nav')
    if (!player) return

    const unlocked = player.chapters_unlocked || [1]

    document.getElementById('rec-username').textContent = player.username
    document.getElementById('rec-stats').innerHTML = [
      ['Level',   player.level],
      ['XP',      player.xp],
      ['HP',      `${player.hp}/${player.max_hp}`],
      ['Gold',    `◈ ${player.gold}`],
      ['Rep',     player.reputation || 'neutral'],
      ['Element', player.element || '—'],
    ].map(([k, v]) => {
      const c = { HP:'ice', Gold:'amber', Element:'ice', Rep:'green' }
      return `<div class="stat-cell">
        <span class="stat-k">${k}</span>
        <span class="stat-v ${c[k]||''}">${v}</span>
      </div>`
    }).join('')

    // Chapter preview pages map (add entries as chapters get preview pages)
    const CH_PREVIEW = { 1: 'The_Watcher.html' }

    document.getElementById('chapter-list').innerHTML = CHAPTERS.map(ch => {
      const isUnlocked = unlocked.includes(ch.number)
      const previewHref = CH_PREVIEW[ch.number]
      const chNumLabel = `<span style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.22em;color:var(--gold);display:block;margin-bottom:3px;text-transform:uppercase">Ch.${String(ch.number).padStart(2,'0')}</span>`

      const thumbInner = CH_COVERS[ch.number]
        ? CH_COVERS[ch.number]
        : `<div style="display:flex;align-items:center;justify-content:center;height:100%"><span style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;color:#3a4354">Ch.${String(ch.number).padStart(2,'0')}</span></div>`

      const thumbHtml = previewHref && isUnlocked
        ? `<a href="${previewHref}" class="ch-thumb" title="View Chapter ${ch.number} preview" style="display:block;cursor:pointer;text-decoration:none" onclick="event.preventDefault();goTo('${previewHref}')">${thumbInner}</a>`
        : `<div class="ch-thumb">${thumbInner}</div>`

      if (!isUnlocked) {
        return `<div class="chapter-entry locked">
          ${thumbHtml}
          <div class="ch-info">
            ${chNumLabel}
            <div class="ch-title">${ch.title}</div>
            <div class="ch-sub">${ch.sub}</div>
          </div>
          <span class="ch-sealed">Sealed</span>
        </div>`
      }

      const isCh1       = ch.number === 1
      const alreadyIn   = (player.current_node || '').startsWith(`ch${ch.number}_`)
      const chUnlocked  = unlocked.includes(ch.number)
      const isReplay    = unlocked.includes(ch.number + 1)

      // Ch1 — single button only
      if (isCh1) {
        const href  = alreadyIn || player.current_chapter === 1 ? 'chapter1.html' : 'chapter1.html'
        const label = player.current_chapter === 1 || alreadyIn ? 'Continue ›' : isReplay ? 'Replay ›' : 'Enter ›'
        return `<div class="chapter-entry">
          ${thumbHtml}
          <div class="ch-info">
            ${chNumLabel}
            <div class="ch-title">${ch.title}</div>
            <div class="ch-sub">${ch.sub}</div>
          </div>
          <a href="${href}" class="ch-btn ${player.current_chapter===1?'active':''}"
             onclick="event.preventDefault();goTo('${href}')">${label}</a>
        </div>`
      }

      // Ch2+ — always show Drive button + Chapter button (chapter locked until drive done)
      const driveLabel = 'Drive ›'
      const chLabel    = alreadyIn || player.current_chapter === ch.number ? 'Continue ›'
                       : isReplay ? 'Replay ›' : 'Enter ›'
      const chHref     = `chapter${ch.number}.html`
      const chDisabled = !chUnlocked

      return `<div class="chapter-entry">
        ${thumbHtml}
        <div class="ch-info">
          ${chNumLabel}
          <div class="ch-title">${ch.title}</div>
          <div class="ch-sub">${ch.sub}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <a href="garage.html?dest=${ch.number}" class="ch-btn"
             onclick="event.preventDefault();goTo('garage.html?dest=${ch.number}')">${driveLabel}</a>
          ${chDisabled
            ? `<span class="ch-btn" style="opacity:.35;cursor:not-allowed;pointer-events:none" title="Complete the drive to unlock">🔒 Chapter</span>`
            : `<a href="${chHref}" class="ch-btn ${player.current_chapter===ch.number?'active':''}"
                 onclick="event.preventDefault();goTo('${chHref}')">${chLabel}</a>`
          }
        </div>
      </div>`
    }).join('')

    // expose for inline onclick
    window.goTo = goTo
  })()
</script>
</body>
</html>
