<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperSede — Sign In</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    :root {
      --bg-0:    #05080c;
      --panel:   #0d1208;
      --ink:     #e8dfc8;
      --ink-dim: #7a7055;
      --gold:    #c8a84a;
      --gold-hot:#f0d080;
      --line:    #1e1c0e;
      --warn:    #e05a44;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 10%, #0e1408 0%, #05080c 55%, #020401 100%);
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, serif;
      overflow-x: hidden;
    }
    body::after {
      content:""; position:fixed; inset:0; pointer-events:none; z-index:9998;
      background-image: repeating-linear-gradient(180deg,
        rgba(200,168,74,.010) 0px, rgba(200,168,74,.010) 1px,
        transparent 1px, transparent 4px);
    }
    .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-book { display:flex; max-width:680px; width:100%; filter:drop-shadow(0 20px 50px rgba(0,0,0,.8)); }
    .auth-page, .parchment {
      flex:1; background:var(--panel) !important;
      border:1px solid var(--line) !important; border-right:none !important;
      border-radius:0 !important; box-shadow:none !important;
      padding:2.5rem 2rem; position:relative;
    }
    .auth-page::before { content:""; position:absolute; top:-1px; left:-1px; width:16px; height:16px; border-top:1px solid var(--gold); border-left:1px solid var(--gold); }
    .auth-page::after  { content:""; position:absolute; bottom:-1px; left:-1px; width:16px; height:16px; border-bottom:1px solid var(--gold); border-left:1px solid var(--gold); }
    .auth-spine {
      width:20px; flex-shrink:0;
      background:linear-gradient(180deg,#14120a 0%,#0e0c06 50%,#14120a 100%);
      border-left:1px solid #2a2412; border-right:1px solid #2a2412; position:relative;
    }
    .auth-spine::before { content:""; position:absolute; top:0; left:50%; width:1px; height:100%; background:linear-gradient(180deg,transparent,rgba(200,168,74,.14) 30%,rgba(200,168,74,.14) 70%,transparent); }
    .chapter-label { font-family:"JetBrains Mono",monospace !important; font-size:9.5px !important; letter-spacing:.42em !important; text-transform:uppercase !important; color:var(--gold) !important; margin-bottom:5px !important; }
    .page-title, h1.page-title { font-family:"Cormorant Garamond",serif !important; font-size:22px !important; font-weight:500 !important; letter-spacing:.04em !important; color:var(--ink) !important; margin-bottom:14px !important; }
    .ink-divider, hr.ink-divider { border:none !important; border-top:1px solid var(--line) !important; margin:12px 0 !important; }
    p { color:var(--ink); }
    .auth-input {
      width:100%; background:rgba(200,168,74,.06) !important;
      border:1px solid var(--line) !important; border-radius:0 !important;
      padding:.55rem .75rem; font-family:"JetBrains Mono",monospace !important;
      font-size:.78rem !important; letter-spacing:.04em;
      color:var(--ink) !important; margin-bottom:.85rem;
      outline:none; transition:border-color .2s;
    }
    .auth-input:focus { border-color:var(--gold) !important; }
    .auth-input::placeholder { color:var(--ink-dim) !important; opacity:1; }
    .auth-btn {
      width:100%; font-family:"JetBrains Mono",monospace !important;
      font-size:.78rem !important; letter-spacing:.2em !important;
      text-transform:uppercase !important; color:var(--ink) !important;
      background:transparent !important; border:1px solid var(--line) !important;
      border-radius:0 !important; padding:.65rem 1rem;
      cursor:pointer; transition:border-color .2s,color .2s,background .2s; margin-bottom:.5rem;
    }
    .auth-btn:hover { border-color:var(--gold) !important; color:var(--gold) !important; background:rgba(200,168,74,.05) !important; }
    .auth-btn:disabled { opacity:.4 !important; cursor:not-allowed !important; }
    .auth-toggle { font-family:"Cormorant Garamond",serif; font-style:italic; font-size:15px; color:var(--ink-dim); text-align:center; margin-top:.75rem; }
    .auth-toggle a { color:var(--gold); cursor:pointer; text-decoration:none; }
    .auth-toggle a:hover { text-decoration:underline; }
    .auth-error { font-family:"JetBrains Mono",monospace; font-size:.68rem; color:var(--warn); margin-bottom:.75rem; min-height:1rem; letter-spacing:.04em; }
    ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg-0)} ::-webkit-scrollbar-thumb{background:var(--line)}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-book">
    <div class="auth-page parchment">
      <div class="page-inner">
        <p class="chapter-label">SuperSede</p>
        <h1 class="page-title" id="form-title">Sign In</h1>
        <hr class="ink-divider">
        <p style="font-family:'IM Fell English',serif;font-style:italic;font-size:.88rem;color:#1a1208;line-height:1.7;margin-bottom:1.5rem">
          Enter your credentials to continue your journey.
        </p>

        <div id="auth-error" class="auth-error"></div>

        <input id="email"    class="auth-input" type="email"    placeholder="Email address" autocomplete="email" />
        <input id="password" class="auth-input" type="password" placeholder="Password"      autocomplete="current-password" />
        <div id="confirm-wrap" style="display:none">
          <input id="confirm" class="auth-input" type="password" placeholder="Confirm password" autocomplete="new-password" />
        </div>

        <button id="submit-btn" class="auth-btn" onclick="handleSubmit()">Enter the World</button>

        <div class="auth-toggle">
          <span id="toggle-text">No account?</span>
          <a onclick="toggleMode()"> <span id="toggle-link">Create one</span></a>
        </div>
      </div>
    </div>
    <div class="auth-spine"></div>
  </div>
</div>

<script type="module">
  import { supabase } from '../supabase.js'

  // If already signed in with a valid player, skip straight to book
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    const { data: player } = await supabase
      .from('players').select('id').eq('user_id', session.user.id).single()
    if (player) {
      window.location.href = 'book.html'
    } else {
      window.location.href = 'setup.html'
    }
  }

  let isSignUp = false

  window.toggleMode = () => {
    isSignUp = !isSignUp
    document.getElementById('form-title').textContent   = isSignUp ? 'Create Account' : 'Sign In'
    document.getElementById('submit-btn').textContent   = isSignUp ? 'Begin Your Journey' : 'Enter the World'
    document.getElementById('confirm-wrap').style.display = isSignUp ? 'block' : 'none'
    document.getElementById('toggle-text').textContent  = isSignUp ? 'Already have an account?' : 'No account?'
    document.getElementById('toggle-link').textContent  = isSignUp ? 'Sign in' : 'Create one'
    document.getElementById('auth-error').textContent   = ''
  }

  window.handleSubmit = async () => {
    const email    = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value
    const confirm  = document.getElementById('confirm')?.value
    const errEl    = document.getElementById('auth-error')
    const btn      = document.getElementById('submit-btn')

    errEl.textContent = ''

    if (!email || !password) {
      errEl.textContent = 'Please fill in all fields.'
      return
    }
    if (isSignUp && password !== confirm) {
      errEl.textContent = 'Passwords do not match.'
      return
    }

    btn.disabled = true
    btn.textContent = '...'

    if (isSignUp) {
      const { error } = await supabase.auth.signUp({ email, password })
      if (error) {
        errEl.textContent = error.message
        btn.disabled = false
        btn.textContent = 'Begin Your Journey'
        return
      }
      // New user — go to setup
      window.location.href = 'setup.html'
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) {
        errEl.textContent = error.message
        btn.disabled = false
        btn.textContent = 'Enter the World'
        return
      }
      // Check if player profile exists
      const { data: { session } } = await supabase.auth.getSession()
      const { data: player } = await supabase
        .from('players').select('id').eq('user_id', session.user.id).single()
      window.location.href = player ? 'book.html' : 'setup.html'
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleSubmit()
  })
</script>
</body>
</html>
