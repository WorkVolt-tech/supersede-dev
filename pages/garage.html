<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperSede — Garage</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Cormorant+Garamond:wght@400;500&family=JetBrains+Mono:wght@400;600&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0:      #05080c;
      --panel:     #0d1208;
      --ink:       #e8dfc8;
      --ink-dim:   #7a7055;
      --gold:      #c8a84a;
      --gold-hot:  #f0d080;
      --gold-dim:  #7a6430;
      --line:      #1e1c0e;
      --rust:      #c8512a;
      --glow-r:    rgba(200,81,42,.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body {
      background: radial-gradient(ellipse at 50% 10%, #0e1408 0%, #05080c 55%, #020401 100%);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* scanlines */
    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:9998;
      background-image: repeating-linear-gradient(180deg,
        rgba(200,168,74,.010) 0px, rgba(200,168,74,.010) 1px,
        transparent 1px, transparent 4px);
    }
    /* road lines subtle overlay */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: repeating-linear-gradient(180deg,
        transparent 0px, transparent 38px,
        rgba(200,168,74,.015) 38px, rgba(200,168,74,.015) 40px);
    }

    /* ── NAV ── */
    #nav { position:relative; z-index:200; }
    #nav, #nav * { background:transparent !important; box-shadow:none !important; border-radius:0 !important; }
    #nav a, #nav button {
      font-family:'JetBrains Mono',monospace !important;
      font-size:10px !important; letter-spacing:.28em !important;
      text-transform:uppercase !important; color:var(--ink-dim) !important;
      text-decoration:none !important; border:none !important; padding:0 !important;
      transition:color .2s !important;
    }
    #nav a:hover, #nav button:hover { color:var(--gold) !important; }
    #nav > *, #nav nav, #nav div {
      border-bottom:1px solid var(--line) !important;
      padding:14px 32px !important; display:flex !important;
      align-items:center !important; gap:28px !important; flex-wrap:wrap !important;
    }

    .garage-wrap { position:relative; z-index:1; max-width:640px; margin:0 auto; padding:0 0 5rem; }

    /* ── Header — matches book/inventory banner style ── */
    .garage-header {
      background: linear-gradient(180deg, rgba(14,18,8,.98), rgba(10,14,6,.95));
      border-bottom: 2px solid var(--rust);
      padding: 1.1rem 1.5rem .85rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .garage-title {
      font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 600;
      color: var(--ink); letter-spacing: .08em;
    }
    .garage-sub { font-family:'JetBrains Mono',monospace; font-size:.5rem; color:var(--rust); letter-spacing:.2em; margin-top:3px; text-transform:uppercase; }

    .materials-strip {
      display:flex; gap:6px; flex-wrap:wrap;
      padding:.65rem 1.5rem; background:rgba(0,0,0,.35);
      border-bottom:.5px solid var(--line);
    }
    .mat-chip {
      font-family:'JetBrains Mono',monospace; font-size:.5rem;
      padding:2px 8px; border-radius:10px;
      border:.5px solid rgba(200,168,74,.2); color:var(--ink-dim);
      background:rgba(0,0,0,.3);
    }
    .mat-chip span { color:var(--gold); }

    /* ── Section ── */
    .section { padding:1rem 1.5rem; border-bottom:.5px solid var(--line); }
    .section-label {
      font-family:'Cinzel',serif; font-size:.7rem; font-weight:600;
      color:var(--rust); letter-spacing:.1em; margin-bottom:.85rem;
      display:flex; align-items:center; gap:.5rem; text-transform:uppercase;
    }
    .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right, var(--rust), transparent); }

    /* ── Vehicle cards — horizontal with side image ── */
    .vehicle-grid { display:flex; flex-direction:column; gap:.85rem; }
    .vehicle-card {
      border:1px solid rgba(200,168,74,.15); border-radius:4px;
      padding:0; cursor:pointer; transition:all .2s; position:relative;
      background:rgba(0,0,0,.3); overflow:hidden;
      display:grid; grid-template-columns:130px 1fr;
    }
    .vehicle-card:hover { border-color:rgba(200,168,74,.35); background:rgba(200,168,74,.04); }
    .vehicle-card.selected { border-color:var(--rust); background:rgba(200,81,42,.06); box-shadow:0 0 20px rgba(200,81,42,.18); }

    /* Vehicle image panel */
    .vehicle-img-panel {
      background: linear-gradient(135deg, rgba(0,0,0,.6), rgba(14,10,6,.8));
      border-right:.5px solid rgba(200,168,74,.1);
      display:flex; align-items:center; justify-content:center;
      padding:.75rem; position:relative; overflow:hidden; min-height:110px;
    }
    .vehicle-img-panel::before {
      content:''; position:absolute; inset:0;
      background: repeating-linear-gradient(90deg, transparent 0, transparent 18px, rgba(200,168,74,.015) 18px, rgba(200,168,74,.015) 20px);
    }
    .vehicle-side-img {
      width:110px; height:70px; object-fit:contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.8));
      position:relative; z-index:1;
      transition: filter .3s;
    }
    .vehicle-card.selected .vehicle-side-img {
      filter: drop-shadow(0 4px 18px rgba(200,81,42,.5));
    }
    /* road strip under vehicle */
    .vehicle-img-panel::after {
      content:''; position:absolute; bottom:12px; left:10%; right:10%; height:3px;
      background: linear-gradient(90deg, transparent, rgba(200,168,74,.25), transparent);
      border-radius:2px;
    }

    /* Vehicle info */
    .vehicle-info { padding:.75rem .9rem; display:flex; flex-direction:column; justify-content:space-between; }
    .vehicle-name { font-family:'Cinzel',serif; font-size:.88rem; font-weight:600; color:var(--ink); margin-bottom:1px; }
    .vehicle-tagline { font-family:'IM Fell English',serif; font-style:italic; font-size:.7rem; color:var(--ink-dim); margin-bottom:.55rem; }

    .stat-bars { display:flex; flex-direction:column; gap:3px; }
    .stat-row-v { display:flex; align-items:center; gap:.45rem; }
    .stat-lbl { font-family:'JetBrains Mono',monospace; font-size:.42rem; color:var(--ink-dim); width:56px; letter-spacing:.04em; text-transform:uppercase; }
    .stat-track { flex:1; height:4px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
    .stat-fill { height:100%; border-radius:2px; transition:width .4s; }
    .stat-val-v { font-family:'JetBrains Mono',monospace; font-size:.46rem; color:var(--ink-dim); width:24px; text-align:right; }

    .active-badge {
      position:absolute; top:.5rem; right:.5rem; z-index:2;
      font-family:'JetBrains Mono',monospace; font-size:.42rem; color:var(--rust);
      border:.5px solid var(--rust); padding:2px 7px; border-radius:10px; letter-spacing:.08em;
      animation:pulse 2s infinite;
    }
    .upgcount-badge {
      position:absolute; bottom:.5rem; right:.5rem; z-index:2;
      font-family:'JetBrains Mono',monospace; font-size:.42rem; color:var(--gold);
      background:rgba(200,168,74,.1); border:.5px solid rgba(200,168,74,.25);
      padding:2px 7px; border-radius:10px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Upgrade slots ── */
    .upgrade-grid { display:grid; grid-template-columns:1fr 1fr; gap:.55rem; }
    .upgrade-slot {
      border:.5px solid rgba(200,168,74,.15); border-radius:3px; padding:.6rem .7rem;
      background:rgba(0,0,0,.25); transition:all .2s;
    }
    .upgrade-slot.installed { border-color:var(--rust); background:rgba(200,81,42,.05); }
    .slot-type { font-family:'JetBrains Mono',monospace; font-size:.42rem; color:var(--ink-dim); letter-spacing:.08em; margin-bottom:3px; text-transform:uppercase; }
    .slot-name { font-family:'Cinzel',serif; font-size:.6rem; color:var(--ink); margin-bottom:3px; }
    .slot-effect { font-family:'JetBrains Mono',monospace; font-size:.46rem; color:var(--ink-dim); line-height:1.4; }

    /* ── Action buttons ── */
    .action-row { display:flex; gap:.5rem; margin-top:.85rem; flex-wrap:wrap; }
    .btn-primary {
      flex:1; font-family:'Cinzel',serif; font-size:.65rem; font-weight:600;
      letter-spacing:.08em; padding:.6rem 1rem; border-radius:3px; cursor:pointer;
      background:linear-gradient(135deg,#5a1000,var(--rust));
      border:1px solid var(--rust); color:#fff; transition:all .2s;
    }
    .btn-primary:hover { box-shadow:0 0 20px var(--glow-r); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-secondary {
      font-family:'JetBrains Mono',monospace; font-size:.52rem; padding:.55rem .9rem;
      border:.5px solid rgba(200,168,74,.2); background:none; color:var(--ink-dim);
      border-radius:3px; cursor:pointer; transition:all .2s; letter-spacing:.04em;
    }
    .btn-secondary:hover { border-color:var(--gold); color:var(--gold); }

    /* ── Drive section ── */
    .drive-section {
      padding:1.25rem 1.5rem; text-align:center;
      background:linear-gradient(180deg,transparent,rgba(200,81,42,.04));
      border-top:.5px solid var(--line);
    }
    .drive-btn {
      width:100%; font-family:'Cinzel',serif; font-size:1rem; font-weight:600;
      letter-spacing:.2em; padding:1rem; border-radius:4px; cursor:pointer;
      background:linear-gradient(135deg,#5a1000,#c8512a,#e06030);
      border:2px solid var(--rust); color:#fff;
      box-shadow:0 0 30px rgba(200,81,42,.25); transition:all .25s;
    }
    .drive-btn:hover { box-shadow:0 0 50px rgba(200,81,42,.55); transform:scale(1.02); }
    .drive-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; box-shadow:none; }
    .drive-label { font-family:'JetBrains Mono',monospace; font-size:.48rem; color:var(--ink-dim); letter-spacing:.1em; margin-top:.5rem; text-transform:uppercase; }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(20px);
      background:rgba(10,14,6,.95); border:1px solid var(--rust); border-radius:3px;
      padding:.5rem 1.2rem; font-family:'JetBrains Mono',monospace; font-size:.58rem;
      color:var(--ink); opacity:0; transition:all .3s; pointer-events:none;
      white-space:nowrap; z-index:999;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Shop modal ── */
    .shop-modal-inner {
      max-width:460px; margin:2rem auto; padding:1.25rem;
      background:#0a0e06; border:1px solid var(--rust); border-radius:5px;
    }
    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg-0)}
    ::-webkit-scrollbar-thumb{background:var(--line)}
    ::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
    /* ── Animate ── */
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:fadeIn .4s ease forwards}
  </style>
</head>
<body>
<div id="nav"></div>
<div class="garage-wrap animate-in">
  <div class="garage-header">
    <div>
      <div class="garage-title">Garage</div>
      <div class="garage-sub">Build · Upgrade · Drive</div>
    </div>
    <button class="btn-secondary" onclick="window.location.href='book.html'">← Book</button>
  </div>

  <!-- Materials strip -->
  <div class="materials-strip" id="materials-strip">
    <div class="mat-chip">Loading...</div>
  </div>

  <!-- Vehicle select -->
  <div class="section">
    <div class="section-label">Your Vehicles</div>
    <p style="font-family:'IM Fell English',serif;font-style:italic;font-size:.75rem;color:var(--ink-dim);margin-bottom:.85rem;line-height:1.6">All three vehicles are permanently yours. Select one to drive, then install upgrades using your materials.</p>
    <div class="vehicle-grid" id="vehicle-grid">Loading...</div>
  </div>

  <!-- Upgrades -->
  <div class="section" id="upgrade-section" style="display:none">
    <div class="section-label">Installed Upgrades</div>
    <div class="upgrade-grid" id="upgrade-grid"></div>
    <div class="action-row">
      <button class="btn-secondary" id="upgrade-shop-btn" onclick="openUpgradeShop()">+ Install Upgrade</button>
    </div>
  </div>

  <!-- Drive -->
  <div class="drive-section">
    <button class="drive-btn" id="drive-btn" disabled onclick="drive()">▶ Drive</button>
    <div class="drive-label" id="drive-label">Select a vehicle to drive</div>
  </div>
</div>

<!-- Upgrade shop modal -->
<div id="shop-modal" style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.88);overflow-y:auto">
  <div class="shop-modal-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-family:'Cinzel',serif;font-size:.88rem;color:var(--rust);letter-spacing:.08em">Upgrade Shop</div>
      <button onclick="closeUpgradeShop()" style="background:rgba(255,255,255,.06);border:1px solid rgba(200,168,74,.2);color:var(--ink);font-size:.85rem;cursor:pointer;padding:3px 8px;border-radius:3px;font-family:'JetBrains Mono',monospace">✕</button>
    </div>
    <div id="shop-list"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { supabase } from '../supabase.js'
import { renderNav, showToast as navToast } from '../components/nav.js'

// ── Vehicle definitions ───────────────────────────────────
const VEHICLES = {
  motorcycle: {
    icon: '🏍️', name: 'Motorcycle', tagline: 'Fast. Fragile. Furious.',
    base: { speed:90, durability:30, firepower:50 },
    color: '#e05555',
    cost: { scrap_metal:5, flashlight:2 },
    desc: 'High speed lets you dodge incoming Eyes. Low armor means every hit counts. The right parts can make it last.',
  },
  car: {
    icon: '🚗', name: 'Car', tagline: 'Balanced. Reliable. Ready.',
    base: { speed:60, durability:60, firepower:60 },
    color: '#5eaee0',
    cost: { scrap_metal:10, flashlight:3 },
    desc: 'The all-rounder. Upgrades push it in any direction. The most flexible platform.',
  },
  van: {
    icon: '🚐', name: 'Van', tagline: 'Slow. Armored. Overwhelming.',
    base: { speed:30, durability:90, firepower:70 },
    color: '#5ec45e',
    cost: { scrap_metal:15, flashlight:5, scrap_blade:2 },
    desc: 'Takes everything and keeps moving. The right engine parts make it surprisingly fast.',
  },
}

// ── Upgrade definitions ───────────────────────────────────
const UPGRADES = [
  // Engine upgrades
  { id:'eng_boost',   slot:'engine',  name:'Turbo Coil',       effect:'+20 Speed',                   icon:'⚡', cost:{scrap_metal:4,flashlight:2},  stat:{speed:20},     vehicles:['motorcycle','car','van'] },
  { id:'eng_heavy',   slot:'engine',  name:'Heavy Engine',     effect:'+10 Speed, +10 Durability',   icon:'⚙️', cost:{scrap_metal:8},                stat:{speed:10,durability:10}, vehicles:['car','van'] },
  { id:'eng_lite',    slot:'engine',  name:'Lite Frame',       effect:'+30 Speed, -10 Durability',   icon:'💨', cost:{scrap_metal:5,scrap_blade:1},  stat:{speed:30,durability:-10}, vehicles:['motorcycle'] },
  // Armor upgrades
  { id:'arm_plate',   slot:'armor',   name:'Scrap Plate',      effect:'+25 Durability',              icon:'🛡', cost:{scrap_metal:6},                stat:{durability:25}, vehicles:['motorcycle','car','van'] },
  { id:'arm_reactive',slot:'armor',   name:'Reactive Mesh',    effect:'+15 Durability, reflect dmg', icon:'⚙️', cost:{scrap_metal:8,scrap_blade:2},  stat:{durability:15}, vehicles:['car','van'] },
  { id:'arm_shield',  slot:'armor',   name:'Flash Shield',     effect:'+20 Durability, blinds Eyes', icon:'🔦', cost:{scrap_metal:4,flashlight:4},   stat:{durability:20}, vehicles:['motorcycle','car','van'] },
  // Weapon upgrades
  { id:'wpn_cannon',  slot:'weapon',  name:'Scrap Cannon',     effect:'+25 Firepower',               icon:'💥', cost:{scrap_metal:5,scrap_blade:3},  stat:{firepower:25},  vehicles:['car','van'] },
  { id:'wpn_rapid',   slot:'weapon',  name:'Rapid Fire Kit',   effect:'+15 Firepower, faster fire',  icon:'🔫', cost:{scrap_metal:4,flashlight:1},   stat:{firepower:15},  vehicles:['motorcycle','car'] },
  { id:'wpn_beam',    slot:'weapon',  name:'Flash Beam',       effect:'+20 Firepower, pierces Eyes', icon:'🔦', cost:{scrap_metal:3,flashlight:6},   stat:{firepower:20},  vehicles:['motorcycle','car','van'] },
  // Special upgrades
  { id:'spc_boost',   slot:'special', name:'Nitro Tank',       effect:'Burst speed on demand',       icon:'🔥', cost:{scrap_metal:6,scrap_blade:2},  stat:{},              vehicles:['motorcycle','car'] },
  { id:'spc_drone',   slot:'special', name:'Eye Drone',        effect:'Auto-targets nearest Eye',    icon:'👁', cost:{scrap_metal:5,flashlight:3},   stat:{firepower:5},   vehicles:['car','van'] },
  { id:'spc_repair',  slot:'special', name:'Repair Kit',       effect:'Regen 5 Durability/sec',      icon:'🔧', cost:{scrap_metal:8,flashlight:2},   stat:{},              vehicles:['motorcycle','car','van'] },
]

const MAT_ICONS = {
  scrap_metal:'⚙️', flashlight:'🔦', scrap_blade:'🗡️',
  scrap_helm:'🪖', scrap_shield:'🛡', energy_drink:'🥤',
  medkit:'💊', knife:'🔪', worn_boots:'👢',
}
const MAT_NAMES = {
  scrap_metal:'Scrap Metal', flashlight:'Flashlight', scrap_blade:'Scrap Blade',
  scrap_helm:'Scrap Helm', scrap_shield:'Scrap Shield', energy_drink:'Energy Drink',
  medkit:'Medkit', knife:'Knife', worn_boots:'Worn Boots',
}

let player = null
let materials = {}  // item_key → quantity
let vehicleData = null  // from players table: { type, parts, upgrades[] }

// ── vehicle_data shape: { active:'car', upgrades:{motorcycle:[],car:[],van:[]} }
// All 3 vehicles are always owned. active = which one is selected to drive.

// ── Normalise legacy vehicle_data ────────────────────────
function normaliseVehicleData(raw) {
  if (!raw) return { active: null, upgrades: { motorcycle:[], car:[], van:[] } }
  // Legacy: { type:'car', upgrades:[] }
  if (raw.type !== undefined && !raw.active) {
    return {
      active: raw.type,
      upgrades: {
        motorcycle: [],
        car: raw.type === 'car' ? (raw.upgrades||[]) : [],
        van: raw.type === 'van' ? (raw.upgrades||[]) : [],
      }
    }
  }
  // Already new format
  if (!raw.upgrades?.motorcycle) raw.upgrades = { motorcycle:[], car:[], van:[] }
  return raw
}

// ── Init ─────────────────────────────────────────────────
player = await renderNav('nav')
if (!player) throw new Error('no player')

const urlDest = new URLSearchParams(window.location.search).get('dest')
const destination = urlDest ? parseInt(urlDest) : null

vehicleData = normaliseVehicleData(player.vehicle_data)
await loadMaterials()
renderMaterials()
renderVehicleGrid()
renderUpgrades()
updateDriveButton()

if (destination) {
  document.getElementById('drive-label').textContent = `DESTINATION: CHAPTER ${destination}`
}

// ── Load materials from inventory ─────────────────────────
async function loadMaterials() {
  const matKeys = Object.keys(MAT_ICONS)
  const { data } = await supabase.from('inventory')
    .select('item_key,quantity')
    .eq('player_id', player.id)
    .in('item_key', matKeys)
  materials = {}
  if (data) data.forEach(r => { materials[r.item_key] = r.quantity })
}

// ── Render materials strip ────────────────────────────────
function renderMaterials() {
  const el = document.getElementById('materials-strip')
  const mats = Object.entries(materials).filter(([,q]) => q > 0)
  if (!mats.length) {
    el.innerHTML = `<span class="mat-chip" style="color:#5a4825">No materials — farm Chapter 1 enemies</span>`
    return
  }
  el.innerHTML = mats.map(([key, qty]) =>
    `<span class="mat-chip">${MAT_ICONS[key]||'📦'} ${MAT_NAMES[key]||key} <span>×${qty}</span></span>`
  ).join('')
}

// ── Vehicle side images ───────────────────────────────────
const VEHICLE_IMGS = {
  motorcycle: '../assets/ride/side_motorcycle.webp',
  car:        '../assets/ride/side_car.webp',
  van:        '../assets/ride/side_van.webp',
}

// ── Render vehicle grid ───────────────────────────────────
function renderVehicleGrid() {
  const el = document.getElementById('vehicle-grid')
  el.innerHTML = Object.entries(VEHICLES).map(([type, v]) => {
    const isActive = vehicleData.active === type
    const stats = computeStats(type)
    const statBars = [
      { label:'SPEED',     val:stats.speed,      max:130, color:'#5eaee0' },
      { label:'DURABILITY',val:stats.durability,  max:130, color:'#5ec45e' },
      { label:'FIREPOWER', val:stats.firepower,   max:130, color:'#e05555' },
    ]
    const upgCount = (vehicleData.upgrades?.[type]||[]).length
    return `
      <div class="vehicle-card${isActive?' selected':''}" onclick="selectVehicle('${type}')">
        ${isActive ? `<div class="active-badge">◉ Active</div>` : ''}
        ${upgCount > 0 ? `<div class="upgcount-badge">${upgCount} upgrade${upgCount>1?'s':''}</div>` : ''}
        <div class="vehicle-img-panel">
          <img class="vehicle-side-img" src="${VEHICLE_IMGS[type]}" alt="${v.name}"
            onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div style=\\'font-size:2.5rem;opacity:.5\\'>${v.icon}</div>')">
        </div>
        <div class="vehicle-info">
          <div>
            <div class="vehicle-name">${v.name}</div>
            <div class="vehicle-tagline">${v.tagline}</div>
          </div>
          <div class="stat-bars">
            ${statBars.map(s => `
              <div class="stat-row-v">
                <div class="stat-lbl">${s.label}</div>
                <div class="stat-track">
                  <div class="stat-fill" style="width:${Math.min(100,s.val/s.max*100)}%;background:${s.color}"></div>
                </div>
                <div class="stat-val-v">${s.val}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>`
  }).join('')
}

function computeStats(type) {
  const base = { ...VEHICLES[type].base }
  const typeUpgrades = vehicleData.upgrades?.[type] || []
  typeUpgrades.forEach(uid => {
    const u = UPGRADES.find(u => u.id === uid)
    if (!u) return
    Object.entries(u.stat).forEach(([k,v]) => { base[k] = (base[k]||0) + v })
  })
  return base
}

function canAffordVehicle(type) {
  return Object.entries(VEHICLES[type].cost).every(([k,n]) => (materials[k]||0) >= n)
}

// ── Select active vehicle (all are owned, just pick which to drive) ───────
window.selectVehicle = async function(type) {
  vehicleData.active = type
  if (!vehicleData.upgrades) vehicleData.upgrades = { motorcycle:[], car:[], van:[] }
  await supabase.from('players').update({ vehicle_data: vehicleData }).eq('id', player.id)
  player.vehicle_data = vehicleData
  toast(`${VEHICLES[type].icon} ${VEHICLES[type].name} selected`)
  renderVehicleGrid()
  renderUpgrades()
  updateDriveButton()
}

// ── Render installed upgrades ─────────────────────────────
function renderUpgrades() {
  const sec  = document.getElementById('upgrade-section')
  const grid = document.getElementById('upgrade-grid')
  if (!vehicleData.active) { sec.style.display='none'; return }
  sec.style.display = 'block'
  const type = vehicleData.active
  const typeUpgrades = vehicleData.upgrades?.[type] || []
  const slots = ['engine','armor','weapon','special']
  grid.innerHTML = slots.map(slot => {
    const installedId = typeUpgrades.find(uid => {
      const u = UPGRADES.find(u=>u.id===uid)
      return u && u.slot === slot
    })
    const u = installedId ? UPGRADES.find(u=>u.id===installedId) : null
    return `
      <div class="upgrade-slot${u?' installed':''}">
        <div class="slot-type">${slot.toUpperCase()}</div>
        ${u ? `
          <div class="slot-name">${u.icon} ${u.name}</div>
          <div class="slot-effect">${u.effect}</div>
          <button onclick="removeUpgrade('${u.id}')" style="margin-top:5px;font-family:'Share Tech Mono',monospace;font-size:.44rem;color:#e05555;background:none;border:.5px solid #e0555540;padding:2px 6px;border-radius:3px;cursor:pointer">✕ Remove</button>
        ` : `
          <div class="slot-name" style="color:#5a4825">Empty Slot</div>
          <div class="slot-effect" style="color:#4a3820">No upgrade installed</div>
        `}
      </div>`
  }).join('')
}

// ── Upgrade shop ──────────────────────────────────────────
window.openUpgradeShop = function() {
  if (!vehicleData.active) { toast('Select a vehicle first', true); return }
  const type = vehicleData.active
  const typeUpgrades = vehicleData.upgrades?.[type] || []
  const modal = document.getElementById('shop-modal')
  const list  = document.getElementById('shop-list')

  const available = UPGRADES.filter(u =>
    u.vehicles.includes(type) && !typeUpgrades.includes(u.id)
  )

  const bySlot = {}
  available.forEach(u => { if (!bySlot[u.slot]) bySlot[u.slot]=[]; bySlot[u.slot].push(u) })

  list.innerHTML = Object.entries(bySlot).map(([slot, ups]) => `
    <div style="margin-bottom:1rem">
      <div style="font-family:'Orbitron',monospace;font-size:.52rem;color:var(--rust);letter-spacing:.1em;margin-bottom:.4rem">${slot.toUpperCase()}</div>
      ${ups.map(u => {
        const afford = Object.entries(u.cost).every(([k,n])=>(materials[k]||0)>=n)
        const conflict = typeUpgrades.find(uid => {
          const ex = UPGRADES.find(u2=>u2.id===uid)
          return ex && ex.slot === u.slot
        })
        return `
          <div style="border:.5px solid rgba(200,184,128,${afford?'.25':'.1'});border-radius:4px;padding:.6rem .7rem;margin-bottom:.4rem;background:rgba(0,0,0,.3)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
              <span style="font-family:'Orbitron',monospace;font-size:.62rem;color:${afford?'#c8b96e':'#5a4825'}">${u.icon} ${u.name}</span>
              <button onclick="installUpgrade('${u.id}')" ${!afford||conflict?'disabled':''} style="font-family:'Share Tech Mono',monospace;font-size:.5rem;color:#1a1208;background:${afford&&!conflict?'rgba(200,184,128,.5)':'rgba(100,80,40,.2)'};border:1px solid ${afford&&!conflict?'rgba(200,184,128,.6)':'rgba(100,80,40,.3)'};border-radius:3px;padding:2px 8px;cursor:${afford&&!conflict?'pointer':'not-allowed'}">
                ${conflict ? 'SLOT FULL' : afford ? 'INSTALL' : 'NEED MATS'}
              </button>
            </div>
            <div style="font-size:.5rem;color:#7a6435;margin-bottom:4px">${u.effect}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              ${Object.entries(u.cost).map(([k,n])=>
                `<span style="font-size:.44rem;color:${(materials[k]||0)>=n?'#5ec45e':'#e05555'};background:rgba(0,0,0,.3);padding:1px 5px;border-radius:8px;border:.5px solid rgba(200,184,128,.1)">${MAT_ICONS[k]||'📦'} ${n} ${MAT_NAMES[k]||k} (have ${materials[k]||0})</span>`
              ).join('')}
            </div>
          </div>`
      }).join('')}
    </div>`
  ).join('') || '<p style="font-family:\'IM Fell English\',serif;font-style:italic;color:#7a6435;font-size:.8rem">All available upgrades installed.</p>'

  modal.style.display = 'block'
}

window.closeUpgradeShop = function() {
  document.getElementById('shop-modal').style.display = 'none'
}

window.installUpgrade = async function(uid) {
  const u = UPGRADES.find(u=>u.id===uid)
  if (!u || !vehicleData.active) return
  const type = vehicleData.active
  for (const [key, qty] of Object.entries(u.cost)) {
    const { data } = await supabase.from('inventory').select('id,quantity').eq('player_id',player.id).eq('item_key',key).maybeSingle()
    if (!data || data.quantity < qty) { toast('Not enough '+MAT_NAMES[key], true); return }
    if (data.quantity <= qty) await supabase.from('inventory').delete().eq('id', data.id)
    else await supabase.from('inventory').update({ quantity: data.quantity - qty }).eq('id', data.id)
    materials[key] = Math.max(0, (materials[key]||0) - qty)
  }
  if (!vehicleData.upgrades) vehicleData.upgrades = { motorcycle:[], car:[], van:[] }
  vehicleData.upgrades[type] = [...(vehicleData.upgrades[type]||[]), uid]
  await supabase.from('players').update({ vehicle_data: vehicleData }).eq('id', player.id)
  toast(`${u.icon} ${u.name} installed on ${VEHICLES[type].name}!`)
  await loadMaterials()
  renderMaterials()
  renderVehicleGrid()
  renderUpgrades()
  closeUpgradeShop()
}

window.removeUpgrade = async function(uid) {
  const type = vehicleData.active
  if (!type) return
  if (!vehicleData.upgrades) vehicleData.upgrades = { motorcycle:[], car:[], van:[] }
  vehicleData.upgrades[type] = (vehicleData.upgrades[type]||[]).filter(id=>id!==uid)
  await supabase.from('players').update({ vehicle_data: vehicleData }).eq('id', player.id)
  const u = UPGRADES.find(u=>u.id===uid)
  toast(`${u?.name||uid} removed`)
  renderVehicleGrid()
  renderUpgrades()
}

// ── Drive ─────────────────────────────────────────────────
function updateDriveButton() {
  const btn = document.getElementById('drive-btn')
  const lbl = document.getElementById('drive-label')
  if (vehicleData.active) {
    btn.disabled = false
    const v = VEHICLES[vehicleData.active]
    lbl.textContent = destination
      ? `${v.icon} ${v.name.toUpperCase()} — HEADING TO CHAPTER ${destination}`
      : `${v.icon} ${v.name.toUpperCase()} READY`
  } else {
    btn.disabled = true
    lbl.textContent = 'SELECT A VEHICLE TO DRIVE'
  }
}

window.drive = function() {
  if (!vehicleData.active) return
  const dest = destination ? `?dest=${destination}` : ''
  window.location.href = 'vehicle.html' + dest
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg, err=false) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.style.borderColor = err ? '#e05555' : 'var(--rust)'
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2800)
}

// Render upgrades if vehicle already owned
if (vehicleData.type) renderUpgrades()
</script>
</body>
</html>
