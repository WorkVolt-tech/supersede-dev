<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperSede — Badges</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    /* ══════════════════════════════════════════════
       SUPERSEDE DARK THEME — Gold / Amber accent
       Injected over main.css — no JS touched.
    ══════════════════════════════════════════════ */
    :root {
      --bg-0:      #05080c;
      --bg-1:      #0a100c;
      --panel:     #0d1208;
      --page-l:    #0b1208;
      --page-r:    #0d1408;
      --ink:       #e8dfc8;
      --ink-dim:   #7a7055;
      --ink-faint: #3a3420;
      --gold:      #c8a84a;
      --gold-hot:  #f0d080;
      --gold-dim:  #7a6430;
      --amber:     #e09020;
      --warm:      #e8b840;
      --warn:      #e05a44;
      --line:      #1e1c0e;
      --green:     #5ec45e;
      --spine-col: #14120a;
    }
    *, *::before, *::after { box-sizing:border-box; }
    html, body {
      background: radial-gradient(ellipse at 50% 10%, #0e1408 0%, #05080c 55%, #020401 100%) !important;
      color: var(--ink) !important;
      font-family: 'Cormorant Garamond', Georgia, serif !important;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* scanlines */
    body::after {
      content:""; position:fixed; inset:0; pointer-events:none; z-index:9998;
      background-image: repeating-linear-gradient(180deg,
        rgba(200,168,74,.010) 0px, rgba(200,168,74,.010) 1px,
        transparent 1px, transparent 4px);
    }
    /* ── NAV ── */
    #nav { position:relative; z-index:200; }
    #nav, #nav * { background:transparent !important; box-shadow:none !important; border-radius:0 !important; }
    #nav a, #nav button {
      font-family:'JetBrains Mono',monospace !important;
      font-size:10px !important; letter-spacing:.28em !important;
      text-transform:uppercase !important; color:var(--ink-dim) !important;
      text-decoration:none !important; border:none !important; padding:0 !important;
      transition:color .2s !important;
    }
    #nav a:hover, #nav button:hover { color:var(--gold) !important; }
    #nav > *, #nav nav, #nav div {
      border-bottom:1px solid var(--line) !important;
      padding:14px 32px !important; display:flex !important;
      align-items:center !important; gap:28px !important; flex-wrap:wrap !important;
    }
    /* ── BOOK WRAP ── */
    .book-wrap {
      background: transparent !important;
      max-width: 1060px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }
    /* ── BOOK — open-book layout ── */
    .book, .craft-grid {
      display: grid !important;
      grid-template-columns: 1fr 20px 1fr !important;
      gap: 0 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,.8)) !important;
      transform: perspective(1600px) rotateX(2.5deg) !important;
      transform-origin: 50% 0 !important;
      margin-top: 10px !important;
    }
    @media(max-width:860px){
      .book, .craft-grid { grid-template-columns:1fr !important; transform:none !important; }
      .spine { display:none !important; }
    }
    /* ── PAGES ── */
    .parchment, .page-left, .page-right {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      color: var(--ink) !important;
      position: relative;
    }
    .page-left  { border-right: none !important; }
    .page-right { border-left:  none !important; }
    /* gradient lighting from spine */
    .page-left::before  { content:""; position:absolute; inset:0; background:linear-gradient(90deg,  rgba(200,168,74,.018) 0%, transparent 55%); pointer-events:none; }
    .page-right::before { content:""; position:absolute; inset:0; background:linear-gradient(270deg, rgba(200,168,74,.014) 0%, transparent 55%); pointer-events:none; }
    /* gold corner brackets */
    .page-left::after {
      content:""; position:absolute; top:-1px; left:-1px;
      width:16px; height:16px;
      border-top:1px solid var(--gold); border-left:1px solid var(--gold);
      pointer-events:none; z-index:1;
    }
    .page-right::after {
      content:""; position:absolute; bottom:-1px; right:-1px;
      width:16px; height:16px;
      border-bottom:1px solid var(--gold); border-right:1px solid var(--gold);
      pointer-events:none; z-index:1;
    }
    .page-inner { padding: 24px 26px !important; }
    /* ── SPINE ── */
    .spine {
      background: linear-gradient(180deg, #14120a 0%, #0e0c06 50%, #14120a 100%) !important;
      border-left:  1px solid #2a2412 !important;
      border-right: 1px solid #2a2412 !important;
      position: relative; z-index: 5; width: 20px !important;
      box-shadow: inset 2px 0 5px rgba(0,0,0,.5), inset -2px 0 5px rgba(0,0,0,.5) !important;
    }
    .spine::before {
      content:""; position:absolute; top:0; left:50%; width:1px; height:100%;
      background:linear-gradient(180deg,transparent,rgba(200,168,74,.12) 30%,rgba(200,168,74,.12) 70%,transparent);
    }
    /* ── TYPOGRAPHY ── */
    .chapter-label, .page-label {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 9.5px !important; letter-spacing: .42em !important;
      text-transform: uppercase !important;
      color: var(--gold) !important; margin-bottom: 5px !important;
    }
    .page-title, h1.page-title, h2.page-title {
      font-family: 'Cormorant Garamond', serif !important;
      font-size: 22px !important; font-weight: 500 !important;
      letter-spacing: .04em !important; color: var(--ink) !important;
      margin-bottom: 14px !important;
    }
    .ink-divider, hr.ink-divider {
      border: none !important; border-top: 1px solid var(--line) !important;
      margin: 12px 0 !important; opacity: 1 !important;
    }
    /* body text */
    p, li, span { color: var(--ink) !important; }
    /* ── INLINE COLOURS — remap parchment browns to gold tones ── */
    [style*="color:#1a1208"] { color: var(--ink) !important; }
    [style*="color:#3a2008"] { color: var(--ink-dim) !important; }
    [style*="color:#7a6435"] { color: var(--gold-dim) !important; }
    [style*="color:#9a8050"] { color: var(--gold-dim) !important; }
    [style*="color:#c8b96e"] { color: var(--gold) !important; }
    [style*="background:rgba(200,184,128"] { background: rgba(200,168,74,.08) !important; }
    [style*="border-color:rgba(139,106,32"] { border-color: rgba(200,168,74,.25) !important; }
    /* ── BUTTONS / CHOICES ── */
    button, .choice, .combat-btn {
      background: transparent !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      color: var(--ink) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px !important; letter-spacing: .08em !important;
      cursor: pointer !important;
      transition: border-color .2s, color .2s, background .2s !important;
    }
    button:hover, .choice:hover, .combat-btn:hover:not(:disabled) {
      border-color: var(--gold) !important;
      color: var(--gold) !important;
      background: rgba(200,168,74,.05) !important;
    }
    /* ── STAT BARS ── */
    .stat-bar-wrap { background: rgba(255,255,255,.06) !important; border-radius:0 !important; }
    .stat-key { color: var(--ink-dim) !important; font-family:'JetBrains Mono',monospace !important; font-size:.58rem !important; letter-spacing:.08em !important; }
    .stat-val { color: var(--ink) !important; }
    /* ── MODALS / OVERLAYS ── */
    [id$="-window"] > div, .end-box {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
    }
    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg-0)}
    ::-webkit-scrollbar-thumb{background:var(--line)}
    ::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
    /* ── ANIMATE-IN ── */
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:fadeIn .4s ease forwards}
  </style>

</head>
<body>
<div class="book-wrap">
  <div id="nav"></div>
  <div class="book animate-in">
    <div class="page-left parchment">
      <div class="page-inner">
        <p class="chapter-label">Hall of Records</p>
        <h1 class="page-title">Earned Seals</h1>
        <p id="earned-count" style="font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#9a8050;letter-spacing:.06em;margin-bottom:.5rem"></p>
        <hr class="ink-divider">
        <div id="earned-seals" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem"></div>
        <p id="no-badges" style="display:none;font-family:'IM Fell English',serif;font-style:italic;font-size:.88rem;color:#7a6435">No seals earned yet. Complete Chapter 1 to begin.</p>
      </div>
    </div>
    <div class="spine"></div>
    <div class="page-right parchment">
      <div class="page-inner">
        <p class="chapter-label">Sealed Records</p>
        <h2 class="page-title">In Progress</h2>
        <hr class="ink-divider">
        <div id="locked-badges"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { supabase }  from '../supabase.js'
  import { renderNav } from '../components/nav.js'

  const ALL_BADGES = [
    {key:'survivor',      name:'Survivor',      icon:'🟡', rarity:'common',    desc:'Complete Chapter 1.',          ctype:'chapter', cval:1 },
    {key:'helper',        name:'Helper',        icon:'🟢', rarity:'uncommon',  desc:'Help 3 players.',              ctype:'helps',   cval:3 },
    {key:'hunter',        name:'Hunter',        icon:'🔴', rarity:'uncommon',  desc:'Defeat 5 players in PvP.',     ctype:'kills',   cval:5 },
    {key:'watcher_slain', name:'Watcher Slain', icon:'👁', rarity:'rare',      desc:'Defeat The Watcher.',          ctype:'boss',    cval:1 },
    {key:'elite',         name:'Elite',         icon:'🟣', rarity:'epic',      desc:'Reach level 10.',              ctype:'level',   cval:10},
    {key:'unknown',       name:'Unknown',       icon:'⚫', rarity:'legendary', desc:'????? hidden conditions ?????', ctype:'hidden',  cval:0 },
  ]
  const RC = {common:'#888',uncommon:'#5ec45e',rare:'#5eaee0',epic:'#a07de0',legendary:'#c8b96e'}

  let player = await renderNav('nav')
  if (!player) throw new Error('no player')

  const {data:earnedRows} = await supabase.from('player_badges').select('badge_key,earned_at').eq('player_id',player.id)
  const earnedKeys = new Set((earnedRows||[]).map(b=>b.badge_key))

  function getProgress(b) {
    switch(b.ctype) {
      case 'chapter': return Math.min(b.cval, player.current_chapter||1)
      case 'level':   return Math.min(b.cval, player.level||1)
      case 'helps':   return Math.min(b.cval, player.helps_given||0)
      case 'kills':   return Math.min(b.cval, player.pvp_kills||0)
      case 'boss':    return earnedKeys.has('watcher_slain')?1:0
      default: return 0
    }
  }

  const earned = ALL_BADGES.filter(b=> earnedKeys.has(b.key))
  const locked  = ALL_BADGES.filter(b=>!earnedKeys.has(b.key))

  document.getElementById('earned-count').textContent = `${earned.length} of ${ALL_BADGES.length} seals obtained`

  if (!earned.length) {
    document.getElementById('no-badges').style.display='block'
  } else {
    document.getElementById('earned-seals').innerHTML = earned.map(b=>`
      <div class="seal">
        <div class="seal-wax" style="border-color:${RC[b.rarity]}80;box-shadow:0 0 12px ${RC[b.rarity]}40">
          <span class="seal-emoji">${b.icon}</span>
          <div class="seal-ring" style="border-color:${RC[b.rarity]}40"></div>
        </div>
        <p class="seal-name" style="color:${RC[b.rarity]}">${b.name}</p>
        <p class="seal-desc">${b.desc}</p>
        <p style="font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#9a8050;letter-spacing:.1em;text-transform:uppercase">${b.rarity}</p>
      </div>
    `).join('')
  }

  document.getElementById('locked-badges').innerHTML = locked.map(b=>{
    const prog = b.cval>0 ? Math.min(1,getProgress(b)/b.cval) : 0
    const rc   = RC[b.rarity]
    const hidden = b.ctype==='hidden'
    return `
      <div style="display:flex;align-items:flex-start;gap:.75rem;padding:.8rem 0;border-bottom:.5px solid rgba(139,106,32,.15);opacity:.55">
        <span style="font-size:1.5rem;filter:grayscale(.7);flex-shrink:0">${b.icon}</span>
        <div style="flex:1;min-width:0">
          <p style="font-family:'Cinzel',serif;font-size:.82rem;color:#3a2e15;margin:0 0 2px">${b.name}</p>
          <p style="font-family:'IM Fell English',serif;font-style:italic;font-size:.75rem;color:#7a6435;margin:0 0 5px">${hidden?'?????':b.desc}</p>
          ${!hidden?`
            <div class="prog-bar"><div class="prog-fill" style="width:${prog*100}%;background:${rc}"></div></div>
            <p style="font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#9a8050;letter-spacing:.06em">${getProgress(b)} / ${b.cval}</p>
          `:''}
        </div>
        <span style="font-family:'Share Tech Mono',monospace;font-size:.55rem;border:.5px solid ${rc}40;border-radius:20px;padding:1px 6px;letter-spacing:.08em;color:${rc};flex-shrink:0;margin-top:2px">${b.rarity}</span>
      </div>
    `
  }).join('')
</script>
</body>
</html>
