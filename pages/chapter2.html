<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperSede — Chapter 2</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       WATCHER THEME — Ice / Blue accent
       Inventory layout: spine, tilt, corner light.
    ══════════════════════════════════════════════ */
    :root {
      --bg-0:      #05080c;
      --bg-1:      #0a1018;
      --panel:     #0d131c;
      --page-l:    #0b1018;
      --page-r:    #0d1520;
      --ink:       #dfe7f2;
      --ink-dim:   #6f7b8d;
      --ink-faint: #3a4354;
      --ice:       #8fd8f0;
      --ice-hot:   #c8eeff;
      --gold:      #c8a84a;
      --gold-hot:  #f0d080;
      --gold-dim:  #7a6430;
      --amber:     #ffb347;
      --amber-hot: #ffd68a;
      --warn:      #e05a44;
      --line:      #1a2230;
      --green:     #5ec45e;
      --purple:    #b06eff;
      --spine-col: #0d1018;
    }
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Nav ── */
    #nav { position: relative; z-index: 200; }
    #nav, #nav * { background: transparent !important; box-shadow: none !important; border-radius: 0 !important; }
    #nav a, #nav button {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px !important; letter-spacing: .28em !important;
      text-transform: uppercase !important; color: var(--ink-dim) !important;
      text-decoration: none !important; border: none !important; padding: 0 !important;
      transition: color .2s !important;
    }
    #nav a:hover, #nav button:hover { color: var(--gold) !important; }
    #nav > *, #nav nav, #nav div {
      border-bottom: 1px solid var(--line) !important;
      padding: 14px 32px !important; display: flex !important;
      align-items: center !important; gap: 28px !important; flex-wrap: wrap !important;
    }

    /* ── Global reset ── */
    html, body {
      background: radial-gradient(ellipse at 50% 0%, #0e1a28 0%, #05080c 55%, #020406 100%) !important;
      color: var(--ink) !important;
      font-family: 'Cormorant Garamond', Georgia, serif !important;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scanlines */
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: repeating-linear-gradient(180deg,
        rgba(143,216,240,.012) 0px, rgba(143,216,240,.012) 1px,
        transparent 1px, transparent 4px);
    }

    /* ── Book wrap ── */
    .book-wrap {
      background: transparent !important;
      max-width: 1060px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* ── Book ── */
    .book {
      display: grid !important;
      grid-template-columns: 1fr 22px 1fr !important;
      align-items: stretch !important;
      gap: 0 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,.8)) !important;
      transform: perspective(1600px) rotateX(2.5deg) !important;
      transform-origin: 50% 0 !important;
      margin-top: 10px !important;
    }
    @media(max-width: 860px) {
      .book { grid-template-columns: 1fr !important; transform: none !important; max-height: none !important; }
      .spine { display: none !important; }
    }

    /* ── Pages ── */
    .parchment, .page-left, .page-right {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      color: var(--ink) !important;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .page-left  { border-right: none !important; background: var(--page-l) !important; }
    .page-right { border-left:  none !important; background: var(--page-r) !important; }

    .page-left::before  {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(90deg, rgba(143,216,240,.014) 0%, transparent 55%);
    }
    .page-right::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(270deg, rgba(143,216,240,.010) 0%, transparent 55%);
    }
    .page-left::after {
      content: "" !important;
      position: absolute !important;
      top: 0 !important; bottom: 0 !important; right: 0 !important;
      width: 32px !important; height: auto !important;
      border: none !important;
      background: linear-gradient(270deg,
        rgba(0,0,0,.28) 0%,
        rgba(0,0,0,.10) 50%,
        transparent 100%) !important;
      pointer-events: none !important;
      z-index: 2 !important;
    }
    .page-right::after {
      content: "" !important;
      position: absolute !important;
      top: 0 !important; bottom: 0 !important; left: 0 !important;
      width: 32px !important; height: auto !important;
      border: none !important;
      background: linear-gradient(90deg,
        rgba(0,0,0,.28) 0%,
        rgba(0,0,0,.10) 50%,
        transparent 100%) !important;
      pointer-events: none !important;
      z-index: 2 !important;
    }

    .spine-inner, .spine-highlight, .spine-shadow,
    .spine-title, .spine-rule, .spine-diamond, .spine-chapter { display: none !important; }

    /* ── Chapter label / subtitle ── */
    .chapter-label {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 9.5px !important;
      letter-spacing: .42em !important;
      text-transform: uppercase !important;
      color: var(--ice) !important;
      margin-bottom: 5px !important;
    }
    .chapter-sub {
      font-size: 17px !important;
      font-style: italic !important;
      color: var(--ink-dim) !important;
      margin-bottom: 0 !important;
    }

    /* ── Divider ── */
    .ink-divider, hr.ink-divider {
      border: none !important;
      border-top: 1px solid var(--line) !important;
      margin: 12px 0 !important;
      opacity: 1 !important;
    }

    /* ── Body text colour remaps ── */
    p, li, span { color: var(--ink) !important; }
    [style*="color:#1a1208"] { color: var(--ink) !important; }
    [style*="color:#3a2008"] { color: var(--ink-dim) !important; }
    [style*="color:#7a6435"] { color: var(--ink-dim) !important; }
    [style*="color:#9a8050"] { color: var(--ink-dim) !important; }
    [style*="color:#c8b96e"] { color: var(--gold) !important; }
    [style*="background:rgba(200,184,128"] { background: rgba(143,216,240,.06) !important; }
    [style*="border-color:rgba(139,106,32"] { border-color: rgba(143,216,240,.25) !important; }

    /* ── Story text ── */
    .story-text {
      font-family: 'Cormorant Garamond', serif !important;
      font-size: 17px !important;
      line-height: 1.65 !important;
      color: var(--ink) !important;
      white-space: pre-line !important;
    }
    .story-text.drop-cap::first-letter {
      font-size: 3.8em !important;
      float: left !important;
      line-height: .78 !important;
      margin: .05em .12em 0 0 !important;
      color: var(--ice) !important;
      font-weight: 600 !important;
    }

    /* ── Notice / outcome box ── */
    .notice-box {
      border: 1px solid var(--ice) !important;
      background: rgba(143,216,240,.06) !important;
      color: var(--ice-hot) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px !important;
      letter-spacing: .06em !important;
      padding: 10px 14px !important;
      border-radius: 0 !important;
      margin-top: 14px !important;
    }

    /* ── HUD ── */
    #hud { color: var(--ink) !important; }
    #hud p, #hud span, #hud div { color: var(--ink) !important; }
    #hud .hud-badge-row .hud-seal-label { color: var(--gold) !important; }
    #hud .hud-chapter { color: var(--ink-dim) !important; }
    #hud .stat-key { color: var(--ink-dim) !important; font-family: 'JetBrains Mono',monospace !important; font-size: .6rem !important; letter-spacing: .08em !important; }
    #hud .stat-val { color: var(--ink) !important; }
    #hud .stat-bar-wrap { background: rgba(255,255,255,.06) !important; border-radius: 0 !important; }
    #hud .stat-box { background: rgba(255,255,255,.03) !important; border: 1px solid var(--line) !important; border-radius: 0 !important; }
    #hud .stat-box-key { color: var(--ink-dim) !important; font-family: 'JetBrains Mono',monospace !important; }
    #hud .stat-box-val { color: var(--amber) !important; }
    #hud button {
      background: rgba(143,216,240,.06) !important;
      border-color: var(--line) !important;
      color: var(--ink) !important;
      border-radius: 0 !important;
      font-family: 'JetBrains Mono',monospace !important;
      transition: border-color .2s, color .2s !important;
    }
    #hud button:hover { border-color: var(--ice) !important; color: var(--gold) !important; }
    #hud div[onclick] {
      background: rgba(176,110,255,.15) !important;
      border-color: rgba(176,110,255,.35) !important;
      color: var(--ink) !important;
      border-radius: 0 !important;
    }

    /* ── Buttons / choices ── */
    button, .choice, .combat-btn {
      background: transparent !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      color: var(--ink) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px !important; letter-spacing: .08em !important;
      cursor: pointer !important;
      transition: border-color .2s, color .2s, background .2s !important;
    }
    button:hover, .choice:hover, .combat-btn:hover:not(:disabled) {
      border-color: var(--ice) !important;
      color: var(--ice) !important;
      background: rgba(143,216,240,.04) !important;
    }

    /* ── Choices panel ── */
    .choices-label {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px !important;
      letter-spacing: .38em !important;
      text-transform: uppercase !important;
      color: var(--ink-dim) !important;
      margin-bottom: 12px !important;
    }
    .choices { display: flex; flex-direction: column; gap: 8px; }

    button.choice, .choice {
      background: transparent !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      color: var(--ink) !important;
      padding: 12px 14px !important;
      text-align: left !important;
      cursor: pointer !important;
      transition: border-color .2s, background .2s !important;
      display: flex !important;
      align-items: flex-start !important;
      gap: 10px !important;
      width: 100% !important;
      font-family: 'Cormorant Garamond', serif !important;
    }
    button.choice:hover, .choice:hover {
      border-color: var(--ice) !important;
      background: rgba(143,216,240,.04) !important;
    }
    button.choice.danger, .choice.danger {
      border-color: rgba(224,90,68,.35) !important;
    }
    button.choice.danger:hover, .choice.danger:hover {
      border-color: var(--warn) !important;
      background: rgba(224,90,68,.06) !important;
    }
    button.choice.locked, .choice.locked {
      opacity: .45 !important;
      cursor: default !important;
      border-color: var(--ink-faint) !important;
    }
    .choice-arrow {
      color: var(--ice) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13px !important;
      flex-shrink: 0 !important;
      margin-top: 1px !important;
    }
    button.choice.danger .choice-arrow, .choice.danger .choice-arrow { color: var(--warn) !important; }
    .choice-body {
      font-size: 17px !important;
      color: var(--ink) !important;
      display: flex !important;
      flex-direction: column !important;
    }
    .choice-sub {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 9.5px !important;
      letter-spacing: .06em !important;
      color: var(--ink-dim) !important;
      margin-top: 3px !important;
    }

    /* ── Stat bars ── */
    .stat-bar-wrap { background: rgba(255,255,255,.06) !important; border-radius: 0 !important; }
    .stat-key { color: var(--ink-dim) !important; font-family: 'JetBrains Mono',monospace !important; font-size: .58rem !important; letter-spacing: .08em !important; }
    .stat-val { color: var(--ink) !important; }

    /* ── Combat panel ── */
    .combat-panel {
      background: var(--bg-1) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      padding: 16px !important;
      position: relative;
    }
    .combat-panel::before {
      content: ""; position: absolute; top: -1px; left: -1px;
      width: 12px; height: 12px;
      border-top: 1px solid var(--ice); border-left: 1px solid var(--ice);
    }
    .combat-enemy-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .combat-enemy-icon { font-size: 2.5rem; }
    .combat-enemy-name {
      font-family: 'Cormorant Garamond', serif !important;
      font-size: 20px !important; font-weight: 600 !important;
      letter-spacing: .04em !important; color: var(--ink) !important;
    }
    .combat-log {
      font-family: 'Cormorant Garamond', serif !important;
      font-style: italic !important;
      font-size: 15px !important;
      line-height: 1.55 !important;
      color: var(--ink-dim) !important;
      background: rgba(0,0,0,.25) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      padding: 10px 12px !important;
      min-height: 3rem !important;
      margin-bottom: 10px !important;
    }
    .combat-log em     { color: var(--gold) !important; font-style: italic; }
    .combat-log strong { color: var(--warn) !important; font-style: normal; }
    .stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .stat-bar-wrap {
      flex: 1; height: 5px !important;
      background: rgba(255,255,255,.06) !important;
      border-radius: 0 !important; overflow: hidden;
    }
    .stat-bar { height: 100%; transition: width .4s, background .4s; }
    .stat-key {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: .58rem !important; letter-spacing: .08em !important;
      color: var(--ink-dim) !important; min-width: 44px;
    }
    .stat-val {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: .6rem !important; color: var(--ink) !important;
      min-width: 50px; text-align: right;
    }

    /* ── Combat action buttons ── */
    .combat-btn {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: .6rem !important; letter-spacing: .06em !important;
      color: var(--ink) !important;
      background: rgba(255,255,255,.03) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      padding: .45rem .5rem !important;
      cursor: pointer !important;
      transition: border-color .2s, background .2s, color .2s !important;
      display: flex !important; align-items: center !important; justify-content: center !important;
    }
    .combat-btn:hover:not(:disabled) {
      border-color: var(--ice) !important;
      color: var(--ice) !important;
      background: rgba(143,216,240,.06) !important;
    }
    .combat-btn:disabled { opacity: .35 !important; cursor: not-allowed !important; }

    /* stat-grid inside HUD */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 4px; margin-top: 6px;
    }

    /* ── End screen ── */
    .end-box {
      background: var(--bg-1) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      padding: 20px !important;
      position: relative;
    }
    .end-box::before { content:""; position:absolute; top:-1px; left:-1px; width:14px; height:14px; border-top:1px solid var(--gold); border-left:1px solid var(--gold); }
    .end-box::after  { content:""; position:absolute; bottom:-1px; right:-1px; width:14px; height:14px; border-bottom:1px solid var(--gold); border-right:1px solid var(--gold); }
    .end-title {
      font-family: 'Cormorant Garamond', serif !important;
      font-size: 22px !important; font-weight: 600 !important;
      letter-spacing: .06em !important;
      color: var(--ice) !important;
      margin-bottom: 10px !important;
    }
    .end-sub {
      font-style: italic !important;
      font-size: 16px !important;
      color: var(--ink-dim) !important;
      line-height: 1.55 !important;
      margin-bottom: 14px !important;
    }
    .end-btn {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: .75rem !important;
      letter-spacing: .14em !important;
      text-transform: uppercase !important;
      color: var(--ink) !important;
      background: transparent !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      padding: .55rem 1.2rem !important;
      cursor: pointer !important;
      transition: border-color .2s, color .2s, background .2s !important;
      text-decoration: none !important;
      display: inline-block !important;
    }
    .end-btn:hover {
      border-color: var(--ice) !important;
      color: var(--ice) !important;
      background: rgba(143,216,240,.04) !important;
    }

    /* ── Items panel ── */
    #items-panel, [id$="-items-panel"] {
      background: var(--bg-1) !important;
      border: 1px solid rgba(143,216,240,.25) !important;
      border-radius: 0 !important;
    }
    [id$="-items-panel"] p,
    [id$="-items-panel"] span { color: var(--ink) !important; }

    /* ── animate-in ── */
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { animation: fadeIn .4s ease forwards; }
    @keyframes animateShake {
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-4px)}
      40%,80%{transform:translateX(4px)}
    }
    .animate-shake { animation: animateShake .35s ease; }

    /* ── System overlay messages ── */
    .sys-overlay, [id="sys-overlay"] {
      background: rgba(5,8,12,.92) !important;
      border: 1px solid var(--ice) !important;
      color: var(--ice-hot) !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10.5px !important;
      letter-spacing: .08em !important;
      border-radius: 0 !important;
    }

    /* ── Toast ── */
    .toast, [class*="toast"] {
      background: rgba(5,8,12,.94) !important;
      border: 1px solid var(--ice) !important;
      color: var(--ice-hot) !important;
      font-family: 'JetBrains Mono', monospace !important;
      border-radius: 0 !important;
    }

    /* ── Loot window ── */
    #loot-window {
      background: var(--bg-1) !important;
      border-color: rgba(143,216,240,.4) !important;
      border-radius: 0 !important;
      color: var(--ink) !important;
    }
    #loot-window p, #loot-window span { color: var(--ink) !important; }

    /* ── Stat window modal ── */
    #stat-window > div {
      background: var(--bg-1) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
    }
    #stat-window * { color: var(--ink) !important; }
    #stat-window [style*="background:rgba(200"] {
      background: rgba(143,216,240,.06) !important;
    }

    /* ── Judge image ── */
    #judge-img {
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      filter: drop-shadow(0 0 20px rgba(143,216,240,.15)) !important;
    }

    /* ── combat-over ── */
    [id$="-combat-over"] { color: var(--ink) !important; }
    [id$="-combat-over"] button {
      font-family: 'JetBrains Mono', monospace !important;
      color: var(--ink) !important;
      background: rgba(143,216,240,.06) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
      cursor: pointer !important;
      transition: border-color .15s, color .15s !important;
    }
    [id$="-combat-over"] button:hover { border-color: var(--ice) !important; color: var(--gold) !important; }

    /* ── Modals ── */
    [id$="-window"] > div, .end-box {
      background: var(--panel) !important;
      border: 1px solid var(--line) !important;
      border-radius: 0 !important;
    }

    /* ── Right panel zone cards ── */
    #right-panel div[onclick] { border-radius: 0 !important; }

    /* ── Spine ── */
    .spine {
      background: linear-gradient(90deg,
        rgba(0,0,0,.0)  0%,
        rgba(0,0,0,.32) 28%,
        rgba(0,0,0,.55) 46%,
        rgba(0,0,0,.62) 50%,
        rgba(0,0,0,.55) 54%,
        rgba(0,0,0,.32) 72%,
        rgba(0,0,0,.0)  100%
      ) !important;
      border-left:  none !important;
      border-right: none !important;
      position: relative; z-index: 5;
      width: 22px !important;
      min-width: 22px !important;
      margin: 0 !important;
      overflow: visible;
      box-shadow: none !important;
    }
    .spine::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0; left: 50%;
      width: 1px;
      transform: translateX(-50%);
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(0,8,18,.9) 8%,
        rgba(0,8,18,.9) 92%,
        transparent 100%);
      z-index: 2;
    }
    .spine::after {
      content: "";
      position: absolute;
      top: 2px; bottom: 2px; left: -3px;
      width: 3px;
      background: repeating-linear-gradient(
        180deg,
        rgba(143,216,240,.06) 0px,
        rgba(143,216,240,.02) 1px,
        rgba(0,0,0,.15)       1px,
        rgba(0,0,0,.05)       2px
      );
      border-left: 1px solid rgba(143,216,240,.10);
      z-index: 1;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-0); }
    ::-webkit-scrollbar-thumb { background: var(--line); }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  </style>
</head>
<body>
<div class="book-wrap">
  <div id="nav"></div>

The Ghost speaks, almost to themselves: "Honest answer. That's unusual here."

"Nine zones," Rue says, spreading it on a dust-covered bench. "One for each element. Fire, Water, Lightning, Arcane, Shadow, Earth, Wind, Plant, Metal. The System placed them in specific locations — each one in a part of the district that matches its nature."

"So pick the one that fits how you fight. Or pick the one the zone opens for. They're not always the same thing."

A silence.

"The Judges respond to elemental resonance. Judge Kaelith — the cooperation Judge — responds to Water, Plant, Earth, Wind, Arcane. Protective elements. Patient ones. Judge Morren — the dominance Judge — responds to Fire, Lightning, Shadow, Metal. Aggressive elements. Precise ones."

Rue looks at the map in your hands. "I don't think either Judge is worse than the other. I think they're the same difficulty, tuned for different kinds of players." A long pause. "I think the System is fair, actually. I just haven't figured out what that means yet."`,

function xpForLevel(lv) { return Math.floor(100 * Math.pow(1.5, lv - 1)) }
function getDefeatedBosses() { return player.defeated_bosses || [] }
function markBossDefeated(key) { const d=[...getDefeatedBosses()]; if(!d.includes(key)) d.push(key); player.defeated_bosses=d; return d }

async function addItem(itemKey, qty) {

    district_map:       { name:'District Map',         item_type:'material', rarity:'common',   icon:'🗺️' },

async function save(updates) {
  Object.assign(player, updates)
  const { data, error } = await supabase.from('players').update(updates).eq('id', player.id).select().single()
  if (error) console.error('[ch2 save]', error.message)
  if (data) { player = data; currentHp = data.hp }
  renderHUD()
}

function calcBadge(moral, pvpKills, helpsGiven) {
  const m=moral||0, pk=pvpKills||0, hg=helpsGiven||0
  if (m>=60&&(hg>=3||pk===0)) return 'elite'
  if (m>=20) return 'green'
  if (m<=-20||(pk>=5&&pk>hg*3)) return 'red'
  return 'neutral'
}

window.goTo = async function goTo(nextId, choice={}) {
  if (!NODES[nextId]) return
  const cur = NODES[nodeId]
  const oldXp=player.xp||0, oldLvl=player.level||1
  const updates = { current_node:'ch2_'+nextId }
  if (cur?.xp)     { updates.xp=oldXp+cur.xp; player.xp=updates.xp }
  if (cur?.hpLoss) { currentHp=Math.max(1,currentHp-cur.hpLoss); updates.hp=currentHp }
  if (choice.moral) {
    const nm=Math.max(-100,Math.min(100,(player.moral_score||0)+choice.moral))
    updates.moral_score=nm; player.moral_score=nm
    const nb=calcBadge(nm,player.pvp_kills,player.helps_given)
    updates.badge=nb; updates.reputation=nb; player.badge=nb
  }
  if (choice.outcome) outcome=choice.outcome
  if (cur?.rewards) for (const r of cur.rewards) await addItem(r.itemKey,r.qty)
  if (updates.xp) { const lu=await checkLevelUp(oldXp,updates.xp,oldLvl); if(lu) Object.assign(updates,lu) }
  await save(updates)
  const lp=document.getElementById('left-page')
  lp.style.cssText+='transition:opacity .3s,transform .3s;opacity:0;transform:translateX(-8px)'
  setTimeout(()=>{ nodeId=nextId; render(); lp.style.opacity='1'; lp.style.transform='translateX(0)'; window.scrollTo({top:0,behavior:'smooth'}) },320)
}

function render() {
  const node=NODES[nodeId]
  if (!node) { document.getElementById('story-text').textContent='Error: node "'+nodeId+'" not found.'; return }
  if (node.sysMsg) showSysOverlay(node.sysMsg)
  const stEl=document.getElementById('story-text')
  stEl.textContent=node.text||''
  stEl.className=nodeId==='opening'?'story-text drop-cap':'story-text'

  // Judge image near boss
  const judgeNodes=['pre_boss_ch2','boss_judges']
  const judgeImg=document.getElementById('judge-img')
  if (judgeNodes.includes(nodeId)) {
    if (!judgeImg) {
      const img=document.createElement('img');img.id='judge-img'
      img.src='../assets/boss/twin_judges.png';img.alt='The Twin Judges'
      img.style.cssText='width:100%;max-width:320px;display:block;margin:1.5rem auto 0;border-radius:4px;opacity:0;transition:opacity 1s;filter:'+(nodeId==='boss_judges'?'none':'brightness(.6) saturate(0.5)')
      stEl.insertAdjacentElement('afterend',img);setTimeout(()=>img.style.opacity='1',100)
    } else { judgeImg.style.filter=nodeId==='boss_judges'?'none':'brightness(.6) saturate(0.5)';judgeImg.style.opacity='1' }
  } else { judgeImg?.remove() }

  document.getElementById('outcome-box').style.display='none'
  const panel=document.getElementById('right-panel')
  if      (node.type==='boss')   renderBoss(panel,node)
  else if (node.type==='combat') renderCombat(panel,node)
  else if (node.type==='end')    renderEnd(panel,node)
  else if (nodeId==='district_hub') renderDistrictHub(panel)
  else                           renderChoices(panel,node)
}

function renderChoices(panel,node) {
  const choices=node.choices||[]
  if (!choices.length) { panel.innerHTML=''; return }
  panel.innerHTML='<p class="choices-label">What do you do?</p><div class="choices">'+
    choices.map(c=>{
      const next=c.next||''
      const moral=c.moral||0
      const outcome=c.outcome||''
      const variant=c.variant?' choice-'+c.variant:''
      const sub=c.sub?'<span class="choice-sub">'+c.sub+'</span>':''
      return '<button class="choice'+variant+'" onclick="goTo(\''+next+'\',{moral:'+moral+',outcome:\''+outcome+'\'})">'+
        '<span class="choice-arrow">→</span>'+
        '<span class="choice-body">'+c.label+sub+'</span>'+
        '</button>'
    }).join('')+'</div>'
}

function renderCombat(panel,node) { buildCombatUI(panel,node.enemy,node.onWin,node.onLose,node.onEscape,false) }
function renderBoss(panel,node) {
  const lvl=player.level||1
  const enemy={...node.enemy}
  // Scale to player level
  enemy.hp = node.enemy.hp + lvl*20
  enemy.atk = node.enemy.atk + Math.floor(lvl*1.5)
  // Count distinct elemental zones the player has entered (via defeated array or skills)
  const elementsAttempted = (() => {
    const elementKeys = ['ignis','aqua','volt','arcane','umbra','terra','aero','flora','ferro','venom']
    const skills = player.skills_unlocked || []
    const defeated = player.defeated_bosses || []
    const found = new Set()
    for (const k of elementKeys) {
      if (skills.some(s=>s.startsWith(k+'_')) || defeated.includes(k)) found.add(k)
    }
    // Also count via current_node history not available, so floor at 1
    return Math.max(1, found.size)
  })()
  buildCombatUI(panel,enemy,node.onWin,node.onLose||'pre_boss_ch2',node.onEscape||'pre_boss_ch2',true,{
    playerMoral: player.moral_score||0,
    elementsAttempted,
  })
}

function buildCombatUI(panel,enemy,onWin,onLose,onEscape,isBoss,extraCtx={}) {
  const cid='cb'+Math.random().toString(36).slice(2,7)
  const $=id=>panel.querySelector('#'+cid+'-'+id)
  let enemyHp=enemy.hp, maxEnemyHp=enemy.hp, maxPlayerHp=player.max_hp||100, over=false
  // Init AI state for this enemy
  window._enemyAIState = initEnemyState(enemy)
  window._combatStatusEffects = {}

  function playerATK() { return (player.atk||5)+(player.power||0)*.5+Math.floor(Math.random()*6) }
  function playerDEF() { return (player.def||2)+(player.guard||0)*.5 }
  function pctBar(v,m) { return Math.max(0,Math.round(v/m*100)) }

  panel.innerHTML=`
    <div style="font-family:'Cinzel',serif;font-size:.9rem;color:#c8b96e;margin-bottom:.5rem">${enemy.icon||'👁'} ${enemy.name}</div>
    <div style="margin-bottom:.5rem">
      <div style="display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.5rem;color:#7a6435;margin-bottom:2px"><span>ENEMY HP</span><span id="${cid}-ehp-txt">${enemyHp}/${maxEnemyHp}</span></div>
      <div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px"><div id="${cid}-ebar" style="height:100%;width:100%;background:#e05555;border-radius:3px;transition:width .3s"></div></div>
    </div>
    <div style="margin-bottom:.75rem">
      <div style="display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.5rem;color:#7a6435;margin-bottom:2px"><span>YOUR HP</span><span id="${cid}-php-txt">${currentHp}/${maxPlayerHp}</span></div>
      <div style="height:6px;background:rgba(255,255,255,.08);border-radius:3px"><div id="${cid}-pbar" style="height:100%;width:100%;background:#5ec45e;border-radius:3px;transition:width .3s"></div></div>
    </div>
    <div id="${cid}-log" style="font-family:'IM Fell English',serif;font-style:italic;font-size:.78rem;color:#c8b96e;min-height:3rem;margin-bottom:.75rem;line-height:1.55"></div>
    <div id="${cid}-actions" style="display:flex;flex-direction:column;gap:6px">
      <button class="choice" onclick="doAction_${cid}('strike')"><span class="choice-arrow">⚔</span><span class="choice-body">Strike<span class="choice-sub">Deal ~${Math.round(playerATK())} damage</span></span></button>
      <button class="choice" onclick="doAction_${cid}('heavy')"><span class="choice-arrow">💥</span><span class="choice-body">Heavy Strike<span class="choice-sub">More damage, slow</span></span></button>
      <button class="choice" onclick="doAction_${cid}('defend')"><span class="choice-arrow">🛡</span><span class="choice-body">Defend<span class="choice-sub">Reduce incoming damage, heal slightly</span></span></button>
      ${onEscape?`<button class="choice" onclick="doAction_${cid}('escape')"><span class="choice-arrow">↩</span><span class="choice-body">Escape<span class="choice-sub">Flee the fight</span></span></button>`:''}
    </div>
    <div id="${cid}-over" style="display:none;margin-top:.75rem"></div>`

  function syncBars() {
    $('ebar').style.width=pctBar(enemyHp,maxEnemyHp)+'%'
    $('pbar').style.width=pctBar(currentHp,maxPlayerHp)+'%'
    $('ehp-txt').textContent=Math.max(0,Math.round(enemyHp))+'/'+maxEnemyHp
    $('php-txt').textContent=Math.max(0,Math.round(currentHp))+'/'+maxPlayerHp
    $('pbar').style.background=currentHp/maxPlayerHp>0.6?'#5ec45e':currentHp/maxPlayerHp>0.3?'#c8b96e':'#e05555'
  }
  function log(msg) { const el=$('log'); el.innerHTML=msg }

  async function endCombat(result) {
    if (over) return; over=true
    $('actions').style.display='none'
    if (result==='win') {
      const oldXp=player.xp||0, oldLvl=player.level||1
      const newXp=oldXp+(enemy.xp||50)
      const updates={xp:newXp,hp:currentHp}
      if (isBoss) {
        const uls=player.chapters_unlocked||[1]; if(!uls.includes(3)) uls.push(3)
        updates.chapters_unlocked=uls; updates.skill_points=(player.skill_points||0)+2
        if (enemy.loot) for (const l of enemy.loot) await addItem(l.itemKey,l.qty)
        if (node?.bossKey) { const d=markBossDefeated(node.bossKey); updates.defeated_bosses=d }
        showToast('Chapter 2 Complete! +2 Bonus SP!')
      }
      const lu=await checkLevelUp(oldXp,newXp,oldLvl); if(lu) Object.assign(updates,lu)
      await save(updates)
      const nextNode=isBoss?'chapter_end_ch2':onWin
      $('over').style.display='block'
      $('over').innerHTML=`<button class="choice" onclick="goTo('${nextNode}')"><span class="choice-arrow">→</span><span class="choice-body">${isBoss?'The Judges are defeated. Chapter ends.':'Continue'}</span></button>`
    } else if (result==='escape') {
      await save({hp:currentHp})
      $('over').style.display='block'
      $('over').innerHTML=`<button class="choice" onclick="goTo('${onEscape||'district_hub'}')"><span class="choice-arrow">↩</span><span class="choice-body">You escape the fight</span></button>`
    } else {
      currentHp=Math.max(1,Math.round(maxPlayerHp*0.25)); await save({hp:currentHp})
      $('over').style.display='block'
      $('over').innerHTML=`<p style="font-family:'IM Fell English',serif;font-style:italic;font-size:.8rem;color:#e05555;margin-bottom:.5rem">You fall. The Judges withdraw — for now.</p><button class="choice" onclick="goTo('${onLose||'pre_boss_ch2'}')"><span class="choice-arrow">↩</span><span class="choice-body">Try again</span></button>`
    }
  }

  window['doAction_'+cid]=async function(action) {
    if (over) return
    $('actions').style.display='none'
    const msgs=[]
    if (action==='escape') { log('You disengage and retreat.'); endCombat('escape'); return }
    if (action==='strike') {
      const dmg=Math.max(1,Math.round(playerATK()-playerDEF()*.3))
      enemyHp=Math.max(0,enemyHp-dmg); msgs.push('You strike for <strong>'+dmg+'</strong> damage.')
    } else if (action==='heavy') {
      const dmg=Math.max(1,Math.round(playerATK()*1.6-playerDEF()*.2))
      enemyHp=Math.max(0,enemyHp-dmg); msgs.push('Heavy strike — <strong>'+dmg+'</strong> damage!')
    } else if (action==='defend') {
      const heal=Math.round(maxPlayerHp*.08); currentHp=Math.min(maxPlayerHp,currentHp+heal)
      msgs.push('You defend. Recovered <strong>'+heal+'</strong> HP.')
    }
    // Enemy counterattack — use enemyAI if available, else flat calc
    if (enemyHp>0) {
      if (window._enemyAI && window._enemyAIState) {
        const statusEffects = window._combatStatusEffects || {}
        window._combatStatusEffects = statusEffects
        const result = window._enemyAI.resolveEnemyTurn(enemy, {
          enemyState:      window._enemyAIState,
          enemyHp,
          maxEnemyHp,
          currentHp,
          maxPlayerHp,
          playerDEF:       ()=>playerDEF(),
          defending:       action==='defend',
          statusEffects,
          yara:            null,
          messages:        msgs,
          triggerAnimation:()=>{},
          onEnemyDmgPlayer:(dmg)=>{ currentHp=Math.max(0,currentHp-dmg) },
          onEnemyHealSelf: ()=>{},
          onEnemyDmgReduced:()=>{},
          playerMoral:     extraCtx.playerMoral||0,
          elementsAttempted: extraCtx.elementsAttempted||1,
        })
      } else {
        const eAtk=Math.max(0,Math.round(enemy.atk-playerDEF()*(action==='defend'?.7:.3)+(Math.random()*6-3)))
        currentHp=Math.max(0,currentHp-eAtk); msgs.push(enemy.name+' attacks for <strong>'+eAtk+'</strong>.')
      }
    }
    syncBars(); log(msgs.join('<br>'))
    if (enemyHp<=0) { log(msgs.join('<br>')+'<br>'+enemy.name+' is defeated.'); endCombat('win'); return }
    if (currentHp<=0) { log(msgs.join('<br>')+'<br>You are overwhelmed.'); endCombat('lose'); return }
    setTimeout(()=>{ $('actions').style.display='flex' },400)
  }
  syncBars()
}

// Level up
async function checkLevelUp(oldXp,newXp,oldLevel) {
  let level=oldLevel,xp=newXp,leveled=false,levelsGained=0
  while(xp>=xpForLevel(level)){xp-=xpForLevel(level);level++;leveled=true;levelsGained++}
  if(!leveled)return null
  const newMaxHp=(player.max_hp||100)+levelsGained*5,newHp=newMaxHp
  const spGained=levelsGained,newSP=(player.skill_points||0)+spGained
  player.skill_points=newSP;player.sp_claimed=(player.sp_claimed||0)+spGained
  const sg=levelsGained
  const us={atk:(player.atk||1)+sg,def:(player.def||0)+sg,power:(player.power||0)+sg,guard:(player.guard||0)+sg,speed:(player.speed||0)+sg,insight:(player.insight||0)+sg,luck:(player.luck||0)+sg,control:(player.control||0)+sg}
  Object.assign(player,us);currentHp=newHp;player.max_hp=newMaxHp;player.level=level;player.xp=newXp
  showToast('LEVEL UP! Lvl '+level+' — +5 HP · +1 all stats · +'+spGained+' SP!')
  renderHUD()
  return{level,max_hp:newMaxHp,hp:newHp,xp:newXp,skill_points:newSP,sp_claimed:player.sp_claimed,...us}
}

function getEquippedBonus(stat) {
  return (window._equippedItems||[]).reduce((s,i)=>s+(i[stat]||0),0)
}
function calcATK() {
  return Math.max(1,Math.round((player.atk||1)+(player.power||0)*0.6+(player.speed||0)*0.2+getEquippedBonus('atk_bonus')))
}
function calcDEF() {
  return Math.round((player.def||0)+(player.guard||0)*0.6+(player.control||0)*0.2+getEquippedBonus('def_bonus'))
}
function calcSPD() {
  return Math.round((player.speed||0)+(player.insight||0)*0.1+getEquippedBonus('speed_bonus'))
}

        <button onclick="document.getElementById('stat-window').remove()" style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:#1a1208">✕</button>
      </div>
      <div style="background:rgba(0,0,0,.08);border-radius:4px;padding:.6rem .75rem;margin-bottom:.75rem">
        <p style="font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#1a1208;letter-spacing:.08em;margin-bottom:4px">DERIVED STATS</p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px">
          ${[['ATK',calcATK(),'#e05555'],['DEF',calcDEF(),'#5ec45e'],['SPD',calcSPD(),'#a8d8ea'],
             ['HP',player.max_hp||100,'#5eaee0'],['LVL',player.level||1,'#c8b96e'],['GOLD',player.gold||0,'#c8b96e']
          ].map(([k,v,c])=>'<div style="text-align:center;background:rgba(0,0,0,.1);border-radius:3px;padding:4px 2px"><span style="font-family:\'Share Tech Mono\',monospace;font-size:.5rem;color:#3a2008;display:block">'+k+'</span><span style="font-family:\'Cinzel\',serif;font-size:.95rem;font-weight:600;color:'+c+'">'+v+'</span></div>').join('')}
        </div>
      </div>
      <p style="font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#1a1208;letter-spacing:.08em;margin-bottom:6px">CORE STATS <span style="color:#a08858">· Unlocked via Skill Tree</span></p>
      ${STATS.map(s=>`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:5px;padding:5px 7px;background:rgba(0,0,0,.07);border-radius:3px">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:4px">
            <span style="font-family:'Cinzel',serif;font-size:.78rem;color:#1a1208;font-weight:600">${s.label}</span>
            <span style="font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#1a1208">${s.val}</span>
            <span style="font-family:'Share Tech Mono',monospace;font-size:.52rem;color:#3a2008;margin-left:auto">${s.derived}</span>
          </div>
          <p style="font-family:'IM Fell English',serif;font-style:italic;font-size:.62rem;color:#3a2008;margin:0">${s.desc}</p>
        </div></div>`).join('')}
      <div style="margin-top:.75rem;padding:.6rem .75rem;background:rgba(0,0,0,.08);border-radius:4px">
        <p style="font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#1a1208;letter-spacing:.08em;margin-bottom:3px">EQUIPPED</p>
        <p style="font-family:'IM Fell English',serif;font-size:.72rem;color:#1a1208;margin:0">${eqItems.map(i=>i.name).join(', ')||'None'}</p>
      </div>
      ${(player.skill_points||0)>0?`<button onclick="document.getElementById('stat-window').remove();window.location.href='skills.html'" style="width:100%;margin-top:.75rem;font-family:'Cinzel',serif;font-size:.8rem;color:#1a1208;background:rgba(160,125,224,.35);border:1px solid rgba(160,125,224,.6);border-radius:3px;padding:.45rem;cursor:pointer">⬡ Spend ${player.skill_points} Skill Points → Skills Page</button>`:''}
    </div>`
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove()})
  document.body.appendChild(modal)
}

function renderHUD() {
  const hp=currentHp, mhp=player.max_hp||100, xp=player.xp||0, lvl=player.level||1
  const BC={neutral:'#c8b96e',red:'#e05555',green:'#5ec45e',elite:'#a07de0'}
  const BS={neutral:'🟡',red:'🔴',green:'🟢',elite:'🟣'}
  const bc=BC[player.badge]||'#c8b96e', bs=BS[player.badge]||'🟡'
  const hpPct=Math.max(0,Math.round(hp/mhp*100))
  const hpCol=hpPct>60?'#5ec45e':hpPct>30?'#c8b96e':'#e05555'
  const xpNext=xpForLevel(lvl)
  const xpIntoLevel=Math.max(0,Math.min(xp,xpNext-1))
  const xpPct=Math.min(100,Math.round(xpIntoLevel/xpNext*100))
  const moral=player.moral_score||0
  const moralPct=Math.round((moral+100)/2)
  const moralCol=moral>=60?'#a0d0ff':moral>=20?'#c8e8a0':moral>=-20?'#c8b96e':moral>=-60?'#e07a40':'#e05555'
  const moralLabel=moral>=70?'HERO':moral>=30?'GOOD':moral>=-10?'NEUTRAL':moral>=-40?'RUTHLESS':moral>=-70?'CORRUPT':'VILLAIN'
  const dotLeft=Math.max(2,Math.min(94,moralPct))

  document.getElementById('hud').innerHTML=`
    <div class="hud-badge-row">
      <span class="hud-seal">${bs}</span>
      <div>
        <p class="hud-seal-label" style="color:${bc}">${(player.badge||'neutral')[0].toUpperCase()+(player.badge||'neutral').slice(1)}</p>
        <p class="hud-chapter">Chapter 2 · Lvl ${lvl}</p>
      </div>
    </div>
    <div class="stat-row">
      <span class="stat-key">HP</span>
      <div class="stat-bar-wrap"><div class="stat-bar" id="hp-bar" style="width:${hpPct}%;background:${hpCol};transition:width .4s,background .4s"></div></div>
      <span class="stat-val" id="hp-val">${Math.round(hp)}/${mhp}</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">XP</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${xpPct}%;background:#a07de0;transition:width .4s"></div></div>
      <span class="stat-val" style="font-size:.52rem;min-width:60px;text-align:right">${xpIntoLevel}/${xpNext}</span>
    </div>
    <div style="margin-bottom:5px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <span style="font-family:'Share Tech Mono',monospace;font-size:.44rem;color:#7a6435;letter-spacing:.07em">REPUTATION</span>
        <span style="font-family:'Cinzel',serif;font-size:.5rem;font-weight:600;color:${moralCol};letter-spacing:.06em">${moralLabel}</span>
      </div>
      <div style="position:relative;height:5px;background:linear-gradient(to right,#e05555,#e07a40,#c8b96e,#c8e8a0,#a0d0ff);border-radius:3px">
        <div style="position:absolute;top:-2px;left:${dotLeft}%;width:9px;height:9px;background:${moralCol};border-radius:50%;transform:translateX(-50%);border:1px solid rgba(0,0,0,.3);transition:left .5s,background .5s"></div>
      </div>
    </div>
    ${(player.skill_points||0)>0?`<div onclick="window.location.href='skills.html'" style="background:rgba(160,125,224,.25);border:1px solid rgba(160,125,224,.5);border-radius:3px;padding:4px 8px;margin-bottom:6px;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#1a1208;cursor:pointer;text-align:center">⬡ ${player.skill_points} SKILL POINTS — tap to spend</div>`:''}
    <div class="stat-grid">
      <div class="stat-box"><span class="stat-box-key">ATK</span><span class="stat-box-val">${calcATK()}</span></div>
      <div class="stat-box"><span class="stat-box-key">DEF</span><span class="stat-box-val">${calcDEF()}</span></div>
      <div class="stat-box"><span class="stat-box-key">GOLD</span><span class="stat-box-val" style="color:#c8b96e">${player.gold||0}</span></div>
    </div>
    <div style="display:flex;gap:4px;margin-top:6px">
      <button onclick="openStatWindow()" style="flex:1;font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#1a1208;background:rgba(200,184,128,.2);border:.5px solid rgba(139,106,32,.4);border-radius:2px;padding:3px 0;cursor:pointer;letter-spacing:.06em">📊 STATS</button>
      <button onclick="window.location.href='skills.html'" style="flex:1;font-family:'Share Tech Mono',monospace;font-size:.55rem;color:#1a1208;background:rgba(160,125,224,.2);border:.5px solid rgba(160,125,224,.4);border-radius:2px;padding:3px 0;cursor:pointer;letter-spacing:.06em">⬡ SKILLS</button>
    </div>`
}

function updateHpBar(hp) {
  currentHp=hp
  const mhp=player.max_hp||100, pct=Math.max(0,Math.round(hp/mhp*100))
  const col=pct>60?'#5ec45e':pct>30?'#c8b96e':'#e05555'
  const bar=document.getElementById('hp-bar'), val=document.getElementById('hp-val')
  if(bar){bar.style.width=pct+'%';bar.style.background=col}
  if(val)val.textContent=Math.round(hp)+'/'+mhp
}

// Also load equipped items for stat display
;(async()=>{
  if(!window._equippedItems){
    const {data}=await supabase.from('inventory').select('*').eq('player_id',player.id).not('equipped_slot','is',null)
    window._equippedItems=data||[]
  }
})()

// ── Init ──────────────────────────────────────────
let player   = await renderNav('nav')
if (!player) throw new Error('no player')

let currentHp = player.hp || 100
let nodeId = (player.current_node||'').startsWith('ch2_')
  ? player.current_node.replace('ch2_','')
  : 'opening'
let outcome = null

if (!NODES[nodeId]) nodeId='opening'

renderHUD()
render()

</script>
</body>
</html>
